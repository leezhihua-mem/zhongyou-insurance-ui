<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>疾病百科 - Skill版</title>
    <link rel="stylesheet" href="colors.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', -apple-system, sans-serif;
            background: var(--bg-secondary);
            max-width: 375px;
            margin: 0 auto;
            min-height: 100vh;
            color: var(--text-primary);
        }
        body::before { content: ""; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(135deg, rgba(74,144,226,0.03) 0%, rgba(126,211,178,0.03) 100%); z-index: -1; }
        
        .top-section {
            padding: 24px 24px 32px;
            animation: fadeSlideDown 0.6s ease-out;
        }
        @keyframes fadeSlideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        
        .back-btn {
            width: 44px;
            height: 44px;
            border: 2px solid var(--color-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s;
        }
        .back-btn:hover {
            border-color: var(--color-primary);
            background: rgba(255,107,107,0.1);
            transform: rotate(-10deg);
        }
        
        .header-title {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 900;
            letter-spacing: -1px;
        }
        
        .search-box {
            background: var(--bg-primary);
            border: 1px solid var(--border-light);
            border-radius: 28px;
            padding: 18px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all 0.3s;
        }
        .search-box:focus-within {
            border-color: var(--color-primary);
            background: var(--bg-light-blue);
            box-shadow: var(--shadow-medium);
        }
        
        .search-icon { font-size: 22px; color: var(--color-primary); }
        .search-input {
            flex: 1;
            background: transparent;
            border: none;
            font-size: 16px;
            color: var(--text-primary);
        }
        .search-input:focus { outline: none; }
        .search-input::placeholder { color: var(--text-tertiary); }
        
        .filter-section {
            display: flex;
            gap: 12px;
            padding: 24px;
        }
        
        .filter-tab {
            padding: 12px 24px;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 24px;
            font-size: 13px;
            font-weight: 500;
            color: rgba(255,255,255,0.6);
            cursor: pointer;
            transition: all 0.3s;
        }
        .filter-tab:hover {
            border-color: var(--text-tertiary);
            color: var(--text-primary);
        }
        .filter-tab.active {
            background: linear-gradient(135deg, #FF6B6B 0%, #FF8E8E 100%);
            border-color: transparent;
            color: white;
            box-shadow: 0 8px 24px rgba(255,107,107,0.3);
        }
        
        .disease-list {
            padding: 0 24px 120px;
        }
        
        .disease-item {
            background: var(--bg-primary);
            border: 1px solid var(--border-light);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 16px;
            cursor: pointer;
            transition: all 0.4s;
            animation: fadeIn 0.5s ease-out both;
            position: relative;
            overflow: hidden;
        }
        .disease-item:nth-child(1) { animation-delay: 0.3s; }
        .disease-item:nth-child(2) { animation-delay: 0.4s; }
        .disease-item:nth-child(3) { animation-delay: 0.5s; }
        .disease-item:nth-child(4) { animation-delay: 0.6s; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .disease-item::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 4px;
            background: linear-gradient(180deg, #FF6B6B 0%, #4ECDC4 100%);
            transform: scaleY(0);
            transition: transform 0.3s;
        }
        .disease-item:hover {
            background: rgba(255,255,255,0.06);
            border-color: rgba(255,255,255,0.15);
            transform: translateX(8px);
        }
        .disease-item:hover::before { transform: scaleY(1); }
        
        .disease-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }
        
        .disease-name {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
        }
        
        .disease-category {
            padding: 6px 14px;
            border-radius: 16px;
            font-size: 11px;
            font-weight: 600;
            background: rgba(78,205,196,0.15);
            color: var(--color-primary);
        }
        
        .disease-desc {
            font-size: 14px;
            color: rgba(255,255,255,0.6);
            line-height: 1.5;
        }
        
        .footer-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            max-width: 375px;
            margin: 0 auto;
            background: rgba(10,10,10,0.9);
            border-top: 1px solid rgba(255,255,255,0.08);
            display: flex;
            justify-content: space-around;
            padding: 16px 0 24px;
            backdrop-filter: blur(20px);
        }
        
        .nav-item {
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .nav-item:hover { transform: scale(1.15); }
        
        .nav-icon {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 6px;
            border-radius: 12px;
            background: var(--bg-primary);
            font-size: 16px;
        }
        .nav-item:hover .nav-icon { background: rgba(255,255,255,0.1); }
        .nav-item.active .nav-icon { background: linear-gradient(135deg, #FF6B6B, #4ECDC4); }
        
        .nav-text {
            font-size: 11px;
            color: var(--text-secondary);
        }
        .nav-item.active .nav-text { color: var(--text-primary); }
    </style>
</head>
<body>
    <div class="top-section">
        <div class="header">
            <div class="back-btn">←</div>
            <div class="header-title">疾病百科</div>
        </div>
        <div class="search-box">
            <span class="search-icon">⊙</span>
            <input type="text" class="search-input" placeholder="搜索疾病名称">
        </div>
    </div>
    
    <div class="filter-section">
        <div class="filter-tab active">全部</div>
        <div class="filter-tab">心血管</div>
        <div class="filter-tab">呼吸系统</div>
        <div class="filter-tab">消化系统</div>
    </div>
    
    <div class="disease-list">
        <div class="disease-item">
            <div class="disease-header">
                <div class="disease-name">高血压</div>
                <div class="disease-category">心血管</div>
            </div>
            <div class="disease-desc">血压持续升高，可能引发心脏病、脑卒中</div>
        </div>
        
        <div class="disease-item">
            <div class="disease-header">
                <div class="disease-name">糖尿病</div>
                <div class="disease-category">代谢系统</div>
            </div>
            <div class="disease-desc">血糖代谢异常，需长期控制血糖水平</div>
        </div>
        
        <div class="disease-item">
            <div class="disease-header">
                <div class="disease-name">冠心病</div>
                <div class="disease-category">心血管</div>
            </div>
            <div class="disease-desc">冠状动脉粥样硬化，心肌缺血缺氧</div>
        </div>
        
        <div class="disease-item">
            <div class="disease-header">
                <div class="disease-name">胃炎</div>
                <div class="disease-category">消化系统</div>
            </div>
            <div class="disease-desc">胃黏膜炎症，常见消化系统疾病</div>
        </div>
    </div>
    
    <div class="footer-nav">
        <div class="nav-item">
            <div class="nav-icon">⌂</div>
            <div class="nav-text">首页</div>
        </div>
        <div class="nav-item active">
            <div class="nav-icon">◎</div>
            <div class="nav-text">查询</div>
        </div>
        <div class="nav-item">
            <div class="nav-icon">⏱</div>
            <div class="nav-text">提醒</div>
        </div>
        <div class="nav-item">
            <div class="nav-icon">◉</div>
            <div class="nav-text">我的</div>
        </div>
    </div>
    
    <script>
        document.querySelector('.back-btn').onclick = () => location.href = '首页_skill版.html';
        
        // 筛选标签切换
        document.querySelectorAll('.filter-tab').forEach(tab => {
            tab.onclick = function() {
                document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                
                // 筛选疾病
                const filter = this.textContent;
                filterDiseases('', filter);
            };
        });
        
        // 搜索过滤
        const searchInput = document.querySelector('.search-input');
        searchInput.addEventListener('input', function() {
            const keyword = this.value.trim();
            const activeFilter = document.querySelector('.filter-tab.active').textContent;
            filterDiseases(keyword, activeFilter);
        });
        
        // 过滤函数
        function filterDiseases(keyword, category) {
            const items = document.querySelectorAll('.disease-item');
            let visibleCount = 0;
            
            items.forEach(item => {
                const name = item.querySelector('.disease-name').textContent;
                const desc = item.querySelector('.disease-desc').textContent;
                const catTag = item.querySelector('.disease-category').textContent;
                
                // 关键词匹配
                const matchKeyword = !keyword || 
                    name.includes(keyword) || 
                    desc.includes(keyword);
                
                // 分类匹配
                const matchCategory = category === '全部' || catTag.includes(category);
                
                if (matchKeyword && matchCategory) {
                    item.style.display = 'block';
                    visibleCount++;
                } else {
                    item.style.display = 'none';
                }
            });
            
            // 无结果提示
            showNoResult(visibleCount === 0, keyword);
        }
        
        // 无结果提示
        function showNoResult(show, keyword) {
            let noResult = document.querySelector('.no-result');
            if (show) {
                if (!noResult) {
                    noResult = document.createElement('div');
                    noResult.className = 'no-result';
                    noResult.style.cssText = 'text-align:center;padding:60px;color:var(--text-tertiary);';
                    document.querySelector('.disease-list').appendChild(noResult);
                }
                noResult.textContent = keyword ? `未找到"${keyword}"相关疾病` : '暂无疾病';
                noResult.style.display = 'block';
            } else if (noResult) {
                noResult.style.display = 'none';
            }
        }
        
        // 疾病点击
        document.querySelectorAll('.disease-item').forEach(item => {
            item.onclick = function() {
                const name = this.querySelector('.disease-name').textContent;
                // 记录查询
                addQueryRecord(name, '疾病');
                location.href = '疾病详情_skill版.html';
            };
        });
        
        // 导航点击
        document.querySelectorAll('.nav-item').forEach(item => {
            item.onclick = function() {
                const text = this.querySelector('.nav-text').textContent;
                if (text === '首页') location.href = '首页_skill版.html';
                if (text === '提醒') location.href = '用药提醒_skill版.html';
                if (text === '我的') location.href = '查询记录_skill版.html';
            };
        });
        
        // 查询记录工具
        function addQueryRecord(name, type) {
            const records = JSON.parse(localStorage.getItem('queryRecords') || '[]');
            records.unshift({
                name: name,
                type: type,
                time: new Date().toISOString()
            });
            localStorage.setItem('queryRecords', JSON.stringify(records.slice(0, 50)));
        }
    </script>
</body>
</html>
