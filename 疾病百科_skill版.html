<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>疾病百科 - Skill版</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', -apple-system, sans-serif;
            background: #0A0A0A;
            max-width: 375px;
            margin: 0 auto;
            min-height: 100vh;
            color: #F5F5F5;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 20% 30%, rgba(255,107,107,0.08) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(78,205,196,0.08) 0%, transparent 50%);
            z-index: -1;
        }
        
        .top-section {
            padding: 24px 24px 32px;
            animation: fadeSlideDown 0.6s ease-out;
        }
        @keyframes fadeSlideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        
        .back-btn {
            width: 44px;
            height: 44px;
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s;
        }
        .back-btn:hover {
            border-color: #FF6B6B;
            background: rgba(255,107,107,0.1);
            transform: rotate(-10deg);
        }
        
        .header-title {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 900;
            letter-spacing: -1px;
        }
        
        .search-box {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 28px;
            padding: 18px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all 0.3s;
        }
        .search-box:focus-within {
            border-color: #4ECDC4;
            background: rgba(78,205,196,0.05);
            box-shadow: 0 0 32px rgba(78,205,196,0.2);
        }
        
        .search-icon { font-size: 22px; color: #4ECDC4; }
        .search-input {
            flex: 1;
            background: transparent;
            border: none;
            font-size: 16px;
            color: #F5F5F5;
        }
        .search-input:focus { outline: none; }
        .search-input::placeholder { color: rgba(255,255,255,0.3); }
        
        .filter-section {
            display: flex;
            gap: 12px;
            padding: 24px;
        }
        
        .filter-tab {
            padding: 12px 24px;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 24px;
            font-size: 13px;
            font-weight: 500;
            color: rgba(255,255,255,0.6);
            cursor: pointer;
            transition: all 0.3s;
        }
        .filter-tab:hover {
            border-color: rgba(255,255,255,0.3);
            color: #F5F5F5;
        }
        .filter-tab.active {
            background: linear-gradient(135deg, #FF6B6B 0%, #FF8E8E 100%);
            border-color: transparent;
            color: white;
            box-shadow: 0 8px 24px rgba(255,107,107,0.3);
        }
        
        .disease-list {
            padding: 0 24px 120px;
        }
        
        .disease-item {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 16px;
            cursor: pointer;
            transition: all 0.4s;
            animation: fadeIn 0.5s ease-out both;
            position: relative;
            overflow: hidden;
        }
        .disease-item:nth-child(1) { animation-delay: 0.3s; }
        .disease-item:nth-child(2) { animation-delay: 0.4s; }
        .disease-item:nth-child(3) { animation-delay: 0.5s; }
        .disease-item:nth-child(4) { animation-delay: 0.6s; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .disease-item::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 4px;
            background: linear-gradient(180deg, #FF6B6B 0%, #4ECDC4 100%);
            transform: scaleY(0);
            transition: transform 0.3s;
        }
        .disease-item:hover {
            background: rgba(255,255,255,0.06);
            border-color: rgba(255,255,255,0.15);
            transform: translateX(8px);
        }
        .disease-item:hover::before { transform: scaleY(1); }
        
        .disease-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }
        
        .disease-name {
            font-size: 18px;
            font-weight: 700;
            color: #F5F5F5;
        }
        
        .disease-category {
            padding: 6px 14px;
            border-radius: 16px;
            font-size: 11px;
            font-weight: 600;
            background: rgba(78,205,196,0.15);
            color: #4ECDC4;
        }
        
        .disease-desc {
            font-size: 14px;
            color: rgba(255,255,255,0.6);
            line-height: 1.5;
        }
        
        .footer-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            max-width: 375px;
            margin: 0 auto;
            background: rgba(10,10,10,0.9);
            border-top: 1px solid rgba(255,255,255,0.08);
            display: flex;
            justify-content: space-around;
            padding: 16px 0 24px;
            backdrop-filter: blur(20px);
        }
        
        .nav-item {
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .nav-item:hover { transform: scale(1.15); }
        
        .nav-icon {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 6px;
            border-radius: 12px;
            background: rgba(255,255,255,0.05);
            font-size: 16px;
        }
        .nav-item:hover .nav-icon { background: rgba(255,255,255,0.1); }
        .nav-item.active .nav-icon { background: linear-gradient(135deg, #FF6B6B, #4ECDC4); }
        
        .nav-text {
            font-size: 11px;
            color: rgba(255,255,255,0.4);
        }
        .nav-item.active .nav-text { color: #F5F5F5; }
    </style>
</head>
<body>
    <div class="top-section">
        <div class="header">
            <div class="back-btn">←</div>
            <div class="header-title">疾病百科</div>
        </div>
        <div class="search-box">
            <span class="search-icon">⊙</span>
            <input type="text" class="search-input" placeholder="搜索疾病名称">
        </div>
    </div>
    
    <div class="filter-section">
        <div class="filter-tab active">全部</div>
        <div class="filter-tab">心血管</div>
        <div class="filter-tab">呼吸系统</div>
        <div class="filter-tab">消化系统</div>
    </div>
    
    <div class="disease-list">
        <div class="disease-item">
            <div class="disease-header">
                <div class="disease-name">高血压</div>
                <div class="disease-category">心血管</div>
            </div>
            <div class="disease-desc">血压持续升高，可能引发心脏病、脑卒中</div>
        </div>
        
        <div class="disease-item">
            <div class="disease-header">
                <div class="disease-name">糖尿病</div>
                <div class="disease-category">代谢系统</div>
            </div>
            <div class="disease-desc">血糖代谢异常，需长期控制血糖水平</div>
        </div>
        
        <div class="disease-item">
            <div class="disease-header">
                <div class="disease-name">冠心病</div>
                <div class="disease-category">心血管</div>
            </div>
            <div class="disease-desc">冠状动脉粥样硬化，心肌缺血缺氧</div>
        </div>
        
        <div class="disease-item">
            <div class="disease-header">
                <div class="disease-name">胃炎</div>
                <div class="disease-category">消化系统</div>
            </div>
            <div class="disease-desc">胃黏膜炎症，常见消化系统疾病</div>
        </div>
    </div>
    
    <div class="footer-nav">
        <div class="nav-item">
            <div class="nav-icon">⌂</div>
            <div class="nav-text">首页</div>
        </div>
        <div class="nav-item active">
            <div class="nav-icon">◎</div>
            <div class="nav-text">查询</div>
        </div>
        <div class="nav-item">
            <div class="nav-icon">⏱</div>
            <div class="nav-text">提醒</div>
        </div>
        <div class="nav-item">
            <div class="nav-icon">◉</div>
            <div class="nav-text">我的</div>
        </div>
    </div>
    
    <script>
        document.querySelector('.back-btn').onclick = () => location.href = '首页_skill版.html';
        document.querySelectorAll('.filter-tab').forEach(tab => {
            tab.onclick = function() {
                document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
            };
        });
        document.querySelectorAll('.disease-item').forEach(item => {
            item.onclick = () => location.href = '疾病详情_skill版.html';
        });
        document.querySelectorAll('.nav-item').forEach(item => {
            item.onclick = function() {
                const text = this.querySelector('.nav-text').textContent;
                if (text === '首页') location.href = '首页_skill版.html';
            };
        });
    </script>
</body>
</html>
