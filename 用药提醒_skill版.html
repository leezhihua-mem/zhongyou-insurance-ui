<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用药提醒 - Skill版</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', -apple-system, sans-serif;
            background: #0A0A0A;
            max-width: 375px;
            margin: 0 auto;
            min-height: 100vh;
            color: #F5F5F5;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 20% 30%, rgba(255,107,107,0.08) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(78,205,196,0.08) 0%, transparent 50%);
            z-index: -1;
        }
        
        .top-section {
            padding: 24px;
            animation: fadeSlideDown 0.6s ease-out;
        }
        @keyframes fadeSlideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        
        .back-btn {
            width: 44px;
            height: 44px;
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s;
        }
        .back-btn:hover {
            border-color: #FF6B6B;
            transform: rotate(-10deg);
        }
        
        .header-title {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 900;
            letter-spacing: -1px;
        }
        
        .add-btn {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #FF6B6B 0%, #4ECDC4 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 24px;
            transition: all 0.3s;
        }
        .add-btn:hover {
            transform: scale(1.1);
        }
        
        .reminder-list {
            padding: 24px;
            padding-bottom: 100px;
        }
        
        .reminder-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 16px;
            cursor: pointer;
            transition: all 0.4s;
            animation: fadeIn 0.5s ease-out both;
            position: relative;
            overflow: hidden;
        }
        .reminder-card:nth-child(1) { animation-delay: 0.2s; }
        .reminder-card:nth-child(2) { animation-delay: 0.3s; }
        .reminder-card:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .reminder-card::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 4px;
            background: linear-gradient(180deg, #FF6B6B 0%, #4ECDC4 100%);
            transform: scaleY(0);
            transition: transform 0.3s;
        }
        
        .reminder-card:hover {
            background: rgba(255,255,255,0.06);
            border-color: rgba(255,255,255,0.15);
            transform: translateX(8px);
        }
        .reminder-card:hover::before { transform: scaleY(1); }
        
        .reminder-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }
        
        .drug-name {
            font-size: 18px;
            font-weight: 700;
            color: #F5F5F5;
        }
        
        .reminder-status {
            padding: 6px 14px;
            border-radius: 16px;
            font-size: 11px;
            font-weight: 600;
        }
        .status-active {
            background: rgba(78,205,196,0.15);
            color: #4ECDC4;
        }
        .status-pending {
            background: rgba(255,107,107,0.15);
            color: #FF6B6B;
        }
        
        .reminder-time {
            display: flex;
            gap: 16px;
            margin-bottom: 12px;
        }
        
        .time-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: rgba(255,255,255,0.7);
        }
        
        .time-icon {
            width: 24px;
            height: 24px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }
        
        .reminder-note {
            font-size: 13px;
            color: rgba(255,255,255,0.5);
        }
        
        .footer-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            max-width: 375px;
            margin: 0 auto;
            background: rgba(10,10,10,0.9);
            border-top: 1px solid rgba(255,255,255,0.08);
            display: flex;
            justify-content: space-around;
            padding: 16px 0 24px;
            backdrop-filter: blur(20px);
        }
        
        .nav-item {
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .nav-item:hover { transform: scale(1.15); }
        
        .nav-icon {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 6px;
            border-radius: 12px;
            background: rgba(255,255,255,0.05);
            font-size: 16px;
        }
        .nav-item:hover .nav-icon { background: rgba(255,255,255,0.1); }
        .nav-item.active .nav-icon { background: linear-gradient(135deg, #FF6B6B, #4ECDC4); }
        
        .nav-text {
            font-size: 11px;
            color: rgba(255,255,255,0.4);
        }
        .nav-item.active .nav-text { color: #F5F5F5; }
    </style>
</head>
<body>
    <div class="top-section">
        <div class="header">
            <div class="back-btn">←</div>
            <div class="header-title">用药提醒</div>
            <div class="add-btn">+</div>
        </div>
    </div>
    
    <div class="reminder-list">
        <div class="reminder-card">
            <div class="reminder-header">
                <div class="drug-name">氨氯地平</div>
                <div class="reminder-status status-active">服用中</div>
            </div>
            <div class="reminder-time">
                <div class="time-item">
                    <div class="time-icon">⏱</div>
                    <span>每日1次</span>
                </div>
                <div class="time-item">
                    <div class="time-icon">◉</div>
                    <span>08:00</span>
                </div>
            </div>
            <div class="reminder-note">5mg/次，餐后服用</div>
        </div>
        
        <div class="reminder-card">
            <div class="reminder-header">
                <div class="drug-name">厄贝沙坦</div>
                <div class="reminder-status status-active">服用中</div>
            </div>
            <div class="reminder-time">
                <div class="time-item">
                    <div class="time-icon">⏱</div>
                    <span>每日1次</span>
                </div>
                <div class="time-item">
                    <div class="time-icon">◉</div>
                    <span>20:00</span>
                </div>
            </div>
            <div class="reminder-note">150mg/次，睡前服用</div>
        </div>
        
        <div class="reminder-card">
            <div class="reminder-header">
                <div class="drug-name">布洛芬</div>
                <div class="reminder-status status-pending">待服用</div>
            </div>
            <div class="reminder-time">
                <div class="time-item">
                    <div class="time-icon">⏱</div>
                    <span>按需服用</span>
                </div>
                <div class="time-item">
                    <div class="time-icon">◉</div>
                    <span>疼痛时</span>
                </div>
            </div>
            <div class="reminder-note">300mg/次，不超过3次/日</div>
        </div>
    </div>
    
    <div class="footer-nav">
        <div class="nav-item">
            <div class="nav-icon">⌂</div>
            <div class="nav-text">首页</div>
        </div>
        <div class="nav-item">
            <div class="nav-icon">◎</div>
            <div class="nav-text">查询</div>
        </div>
        <div class="nav-item active">
            <div class="nav-icon">⏱</div>
            <div class="nav-text">提醒</div>
        </div>
        <div class="nav-item">
            <div class="nav-icon">◉</div>
            <div class="nav-text">我的</div>
        </div>
    </div>
    
    <script>
        document.querySelector('.back-btn').onclick = () => location.href = '首页_skill版.html';
        document.querySelector('.add-btn').onclick = () => alert('添加提醒');
        document.querySelectorAll('.reminder-card').forEach(card => {
            card.onclick = () => alert('编辑提醒');
        });
        document.querySelectorAll('.nav-item').forEach(item => {
            item.onclick = function() {
                const text = this.querySelector('.nav-text').textContent;
                if (text === '首页') location.href = '首页_skill版.html';
                if (text === '查询') location.href = '症状自查_skill版.html';
            };
        });
    </script>
</body>
</html>
