<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>药品查询 - Skill设计版</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'DM Sans', -apple-system, sans-serif;
            background: #0A0A0A;
            max-width: 375px;
            margin: 0 auto;
            min-height: 100vh;
            color: #F5F5F5;
            overflow-x: hidden;
        }
        
        /* 背景纹理 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(255,107,107,0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(78,205,196,0.08) 0%, transparent 50%);
            z-index: -1;
        }
        
        /* 顶部区域 */
        .top-section {
            padding: 32px 24px 48px;
            animation: fadeSlideDown 0.6s ease-out;
        }
        
        @keyframes fadeSlideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 40px;
        }
        
        .back-btn {
            width: 44px;
            height: 44px;
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s;
        }
        
        .back-btn:hover {
            border-color: #FF6B6B;
            background: rgba(255,107,107,0.1);
            transform: rotate(-10deg);
        }
        
        .header-title {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 900;
            letter-spacing: -1px;
        }
        
        /* 搜索框 */
        .search-container {
            position: relative;
            margin-bottom: 32px;
        }
        
        .search-box {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 28px;
            padding: 18px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all 0.3s;
        }
        
        .search-box:focus-within {
            border-color: #4ECDC4;
            background: rgba(78,205,196,0.05);
            box-shadow: 0 0 32px rgba(78,205,196,0.2);
        }
        
        .search-icon {
            font-size: 22px;
            color: #4ECDC4;
        }
        
        .search-input {
            flex: 1;
            background: transparent;
            border: none;
            font-size: 16px;
            color: #F5F5F5;
            font-weight: 500;
        }
        
        .search-input:focus { outline: none; }
        .search-input::placeholder { color: rgba(255,255,255,0.3); }
        
        /* 筛选区 */
        .filter-section {
            display: flex;
            gap: 12px;
            padding: 0 24px 24px;
            animation: fadeSlideDown 0.6s ease-out 0.1s both;
        }
        
        .filter-tab {
            padding: 12px 24px;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 24px;
            font-size: 13px;
            font-weight: 500;
            color: rgba(255,255,255,0.6);
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .filter-tab:hover {
            border-color: rgba(255,255,255,0.3);
            color: #F5F5F5;
        }
        
        .filter-tab.active {
            background: linear-gradient(135deg, #FF6B6B 0%, #FF8E8E 100%);
            border-color: transparent;
            color: white;
            box-shadow: 0 8px 24px rgba(255,107,107,0.3);
        }
        
        /* 提示卡片 */
        .tip-card {
            background: rgba(255,107,107,0.08);
            border-left: 3px solid #FF6B6B;
            padding: 16px 24px;
            margin: 24px;
            font-size: 13px;
            color: rgba(255,255,255,0.8);
            animation: fadeSlideDown 0.6s ease-out 0.2s both;
        }
        
        /* 药品列表 */
        .drug-list {
            padding: 0 24px 120px;
        }
        
        .drug-item {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 16px;
            cursor: pointer;
            transition: all 0.4s;
            animation: fadeIn 0.5s ease-out both;
            position: relative;
            overflow: hidden;
        }
        
        .drug-item:nth-child(1) { animation-delay: 0.3s; }
        .drug-item:nth-child(2) { animation-delay: 0.4s; }
        .drug-item:nth-child(3) { animation-delay: 0.5s; }
        .drug-item:nth-child(4) { animation-delay: 0.6s; }
        .drug-item:nth-child(5) { animation-delay: 0.7s; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .drug-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: linear-gradient(180deg, #FF6B6B 0%, #4ECDC4 100%);
            transform: scaleY(0);
            transition: transform 0.3s;
        }
        
        .drug-item:hover {
            background: rgba(255,255,255,0.06);
            border-color: rgba(255,255,255,0.15);
            transform: translateX(8px);
        }
        
        .drug-item:hover::before {
            transform: scaleY(1);
        }
        
        .drug-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }
        
        .drug-name {
            font-size: 18px;
            font-weight: 700;
            color: #F5F5F5;
            letter-spacing: -0.3px;
        }
        
        .drug-type {
            padding: 6px 14px;
            border-radius: 16px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        
        .drug-type.rx {
            background: rgba(255,107,107,0.15);
            color: #FF6B6B;
        }
        
        .drug-type.otc {
            background: rgba(78,205,196,0.15);
            color: #4ECDC4;
        }
        
        .drug-meta {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        
        .meta-tag {
            padding: 6px 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            font-size: 11px;
            color: rgba(255,255,255,0.5);
        }
        
        .drug-indication {
            font-size: 14px;
            color: rgba(255,255,255,0.6);
            line-height: 1.5;
        }
        
        /* 底部导航 */
        .footer-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 375px;
            margin: 0 auto;
            background: rgba(10,10,10,0.9);
            border-top: 1px solid rgba(255,255,255,0.08);
            display: flex;
            justify-content: space-around;
            padding: 16px 0 24px;
            backdrop-filter: blur(20px);
        }
        
        .nav-item {
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .nav-item:hover { transform: scale(1.15); }
        
        .nav-icon {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 6px;
            border-radius: 12px;
            background: rgba(255,255,255,0.05);
            font-size: 16px;
            transition: all 0.3s;
        }
        
        .nav-item:hover .nav-icon {
            background: rgba(255,255,255,0.1);
        }
        
        .nav-item.active .nav-icon {
            background: linear-gradient(135deg, #FF6B6B 0%, #4ECDC4 100%);
        }
        
        .nav-text {
            font-size: 11px;
            color: rgba(255,255,255,0.4);
            font-weight: 500;
        }
        
        .nav-item.active .nav-text {
            color: #F5F5F5;
        }
        
        /* 自定义滚动条 */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }
    </style>
</head>
<body>
    <div class="top-section">
        <div class="header">
            <div class="back-btn">←</div>
            <div class="header-title">药品查询</div>
        </div>
        <div class="search-container">
            <div class="search-box">
                <span class="search-icon">⊙</span>
                <input type="text" class="search-input" placeholder="搜索药品名称或适应症">
            </div>
        </div>
    </div>
    
    <div class="filter-section">
        <div class="filter-tab active">全部</div>
        <div class="filter-tab">非处方药</div>
        <div class="filter-tab">处方药</div>
    </div>
    
    <div class="tip-card">
        ⚠ 处方药须凭医师处方购买和使用，请勿自行购买服用
    </div>
    
    <div class="drug-list">
        <div class="drug-item">
            <div class="drug-header">
                <div class="drug-name">氨氯地平片</div>
                <div class="drug-type rx">处方药</div>
            </div>
            <div class="drug-meta">
                <span class="meta-tag">钙拮抗剂</span>
                <span class="meta-tag">降压药</span>
            </div>
            <div class="drug-indication">适应症：高血压、冠心病</div>
        </div>
        
        <div class="drug-item">
            <div class="drug-header">
                <div class="drug-name">厄贝沙坦片</div>
                <div class="drug-type rx">处方药</div>
            </div>
            <div class="drug-meta">
                <span class="meta-tag">ARB类</span>
                <span class="meta-tag">降压药</span>
            </div>
            <div class="drug-indication">适应症：高血压</div>
        </div>
        
        <div class="drug-item">
            <div class="drug-header">
                <div class="drug-name">布洛芬缓释胶囊</div>
                <div class="drug-type otc">非处方药</div>
            </div>
            <div class="drug-meta">
                <span class="meta-tag">解热镇痛</span>
            </div>
            <div class="drug-indication">适应症：发热、头痛、关节痛</div>
        </div>
        
        <div class="drug-item">
            <div class="drug-header">
                <div class="drug-name">阿莫西林胶囊</div>
                <div class="drug-type rx">处方药</div>
            </div>
            <div class="drug-meta">
                <span class="meta-tag">抗生素</span>
            </div>
            <div class="drug-indication">适应症：细菌感染</div>
        </div>
        
        <div class="drug-item">
            <div class="drug-header">
                <div class="drug-name">复方感冒灵片</div>
                <div class="drug-type otc">非处方药</div>
            </div>
            <div class="drug-meta">
                <span class="meta-tag">感冒药</span>
            </div>
            <div class="drug-indication">适应症：感冒、发热、头痛</div>
        </div>
    </div>
    
    <div class="footer-nav">
        <div class="nav-item">
            <div class="nav-icon">⌂</div>
            <div class="nav-text">首页</div>
        </div>
        <div class="nav-item active">
            <div class="nav-icon">◎</div>
            <div class="nav-text">查询</div>
        </div>
        <div class="nav-item">
            <div class="nav-icon">⏱</div>
            <div class="nav-text">提醒</div>
        </div>
        <div class="nav-item">
            <div class="nav-icon">◉</div>
            <div class="nav-text">我的</div>
        </div>
    </div>
    
    <script>
        document.querySelector('.back-btn').onclick = () => history.back();
        
        document.querySelectorAll('.filter-tab').forEach(tab => {
            tab.onclick = function() {
                document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
            };
        });
        
        document.querySelectorAll('.drug-item').forEach(item => {
            item.onclick = () => location.href = '药品详情_skill版.html';
        });
    </script>
</body>
</html>
