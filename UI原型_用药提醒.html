<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>用药提醒 - UI原型</title>
    <style>
        /* Notion风格 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: #ffffff;
            max-width: 375px;
            margin: 0 auto;
            min-height: 100vh;
            color: rgba(0,0,0,0.95);
            padding-bottom: 60px;
        }
        
        .header {
            background: #dd5b00;
            color: #fff;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .back-btn { font-size: 20px; cursor: pointer; color: #fff; }
        .header-title { font-size: 16px; font-weight: 600; }
        .add-btn { font-size: 20px; cursor: pointer; color: #fff; }
        
        .today-progress {
            padding: 16px;
            background: #f6f5f4;
            text-align: center;
        }
        
        .progress-title {
            font-size: 12px;
            color: #615d59;
            margin-bottom: 8px;
        }
        
        .progress-bar {
            height: 8px;
            background: rgba(0,0,0,0.1);
            border-radius: 9999px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            width: 50%;
            background: #2a9d99;
            border-radius: 9999px;
        }
        
        .progress-text {
            font-size: 12px;
            color: #615d59;
            margin-top: 8px;
        }
        
        .section {
            padding: 16px;
        }
        
        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: rgba(0,0,0,0.95);
            margin-bottom: 12px;
        }
        
        .reminder-item {
            background: #f6f5f4;
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: 4px;
            padding: 12px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
        }
        
        .reminder-time {
            width: 60px;
            text-align: center;
        }
        
        .time-text {
            font-size: 14px;
            font-weight: 600;
            color: rgba(0,0,0,0.95);
        }
        
        .time-period {
            font-size: 11px;
            color: #615d59;
        }
        
        .reminder-info {
            flex: 1;
            margin-left: 12px;
        }
        
        .reminder-name {
            font-size: 13px;
            font-weight: 500;
        }
        
        .reminder-dose {
            font-size: 12px;
            color: #615d59;
        }
        
        .reminder-check {
            width: 24px;
            height: 24px;
            border: 1px solid rgba(0,0,0,0.2);
            border-radius: 9999px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #fff;
            cursor: pointer;
        }
        
        .reminder-check.done {
            background: #2a9d99;
            border-color: #2a9d99;
        }
        
        .history-item {
            padding: 12px;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
        }
        
        .history-date {
            font-size: 12px;
            color: #615d59;
        }
        
        .history-status {
            font-size: 12px;
            color: #2a9d99;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="back-btn">←</div>
        <div class="header-title">用药提醒</div>
        <div class="add-btn">+</div>
    </div>
    
    <div class="today-progress">
        <div class="progress-title">今日服药进度</div>
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
        <div class="progress-text">已完成 1/2 次</div>
    </div>
    
    <div class="section">
        <div class="section-title">今日计划</div>
        
        <div class="reminder-item">
            <div class="reminder-time">
                <div class="time-text">08:00</div>
                <div class="time-period">早餐后</div>
            </div>
            <div class="reminder-info">
                <div class="reminder-name">氨氯地平片</div>
                <div class="reminder-dose">1片 (5mg)</div>
            </div>
            <div class="reminder-check done">✓</div>
        </div>
        
        <div class="reminder-item">
            <div class="reminder-time">
                <div class="time-text">20:00</div>
                <div class="time-period">晚餐后</div>
            </div>
            <div class="reminder-info">
                <div class="reminder-name">厄贝沙坦片</div>
                <div class="reminder-dose">1片 (150mg)</div>
            </div>
            <div class="reminder-check"></div>
        </div>
    </div>
    
    <div class="section">
        <div class="section-title">历史记录</div>
        
        <div class="history-item">
            <div class="history-date">2026-04-07</div>
            <div class="history-status">✓ 全部完成</div>
        </div>
        
        <div class="history-item">
            <div class="history-date">2026-04-06</div>
            <div class="history-status">✓ 全部完成</div>
        </div>
        
        <div class="history-item">
            <div class="history-date">2026-04-05</div>
            <div class="history-status" style="color: #dd5b00;">⚠ 漏服1次</div>
        </div>
    </div>
    
    <script>
        document.querySelector('.back-btn').addEventListener('click', () => location.href = 'index.html');
        
        document.querySelectorAll('.reminder-check').forEach(check => {
            check.addEventListener('click', function() {
                this.classList.toggle('done');
                this.textContent = this.classList.contains('done') ? '✓' : '';
            });
        });
        
        document.querySelector('.add-btn').addEventListener('click', () => {
            alert('添加新提醒功能开发中...');
        });
    </script>
</body>
</html>
