<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>疾病详情 - UI原型</title>
    <style>
        /* Notion风格 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: #ffffff;
            max-width: 375px;
            margin: 0 auto;
            min-height: 100vh;
            color: rgba(0,0,0,0.95);
        }
        
        .header {
            background: #0075de;
            color: #fff;
            padding: 16px;
            display: flex;
            align-items: center;
        }
        
        .back-btn {
            font-size: 20px;
            margin-right: 12px;
            cursor: pointer;
            color: #fff;
        }
        
        .header-title {
            font-size: 16px;
            font-weight: 600;
        }
        
        .disclaimer {
            background: #fff8e6;
            border: 1px solid rgba(0,0,0,0.1);
            padding: 8px 12px;
            margin: 8px;
            border-radius: 4px;
            font-size: 12px;
            color: #856404;
        }
        
        .disease-title {
            padding: 16px;
            background: #f6f5f4;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }
        
        .disease-name {
            font-size: 18px;
            font-weight: 600;
            color: rgba(0,0,0,0.95);
        }
        
        .disease-category {
            font-size: 12px;
            color: #615d59;
            margin-top: 4px;
        }
        
        .section {
            padding: 16px;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }
        
        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: #0075de;
            margin-bottom: 12px;
        }
        
        .section-content {
            font-size: 13px;
            color: rgba(0,0,0,0.95);
            line-height: 1.5;
        }
        
        .symptom-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }
        
        .symptom-tag {
            padding: 4px 8px;
            background: #f2f9ff;
            border-radius: 9999px;
            font-size: 12px;
            color: #097fe8;
        }
        
        .related-drugs {
            padding: 16px;
            background: #f6f5f4;
        }
        
        .drug-item {
            padding: 12px;
            background: #ffffff;
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: 4px;
            margin-bottom: 8px;
            cursor: pointer;
        }
        
        .drug-item:hover {
            background: #f2f9ff;
        }
        
        .drug-name {
            font-size: 13px;
            font-weight: 500;
        }
        
        .drug-desc {
            font-size: 12px;
            color: #615d59;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="back-btn">←</div>
        <div class="header-title">疾病详情</div>
    </div>
    
    <div class="disclaimer">⚠️ 本资料仅供参考，不能替代专业医师的诊疗建议。</div>
    
    <div class="disease-title">
        <div class="disease-name">高血压</div>
        <div class="disease-category">心血管系统疾病 | 常见病</div>
    </div>
    
    <div class="section">
        <div class="section-title">疾病定义</div>
        <div class="section-content">
            高血压是以体循环动脉血压持续升高为主要特征的临床综合征，收缩压≥140mmHg或舒张压≥90mmHg。
        </div>
    </div>
    
    <div class="section">
        <div class="section-title">典型症状</div>
        <div class="symptom-list">
            <div class="symptom-tag">头痛</div>
            <div class="symptom-tag">头晕</div>
            <div class="symptom-tag">心悸</div>
            <div class="symptom-tag">耳鸣</div>
            <div class="symptom-tag">乏力</div>
        </div>
    </div>
    
    <div class="section">
        <div class="section-title">病因</div>
        <div class="section-content">
            遗传因素、高盐饮食、肥胖、精神紧张、吸烟饮酒等。
        </div>
    </div>
    
    <div class="section">
        <div class="section-title">治疗方式</div>
        <div class="section-content">
            生活方式干预（低盐饮食、运动、减重）+ 药物治疗（利尿剂、ACEI、ARB、钙拮抗剂等）。
        </div>
    </div>
    
    <div class="related-drugs">
        <div class="section-title">常用药品</div>
        <div class="drug-item">
            <div class="drug-name">氨氯地平</div>
            <div class="drug-desc">钙拮抗剂，长效降压</div>
        </div>
        <div class="drug-item">
            <div class="drug-name">厄贝沙坦</div>
            <div class="drug-desc">ARB类，保护肾功能</div>
        </div>
    </div>
    
    <script>
        document.querySelector('.back-btn').addEventListener('click', () => location.href = 'index.html');
        document.querySelectorAll('.drug-item').forEach(item => {
            item.addEventListener('click', () => location.href = 'UI原型_药品详情.html');
        });
    </script>
</body>
</html>
