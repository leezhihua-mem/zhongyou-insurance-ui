<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI问答 - Skill版</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', -apple-system, sans-serif;
            background: #0A0A0A;
            max-width: 375px;
            margin: 0 auto;
            min-height: 100vh;
            color: #F5F5F5;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 20% 30%, rgba(255,107,107,0.08) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(78,205,196,0.08) 0%, transparent 50%);
            z-index: -1;
        }
        
        .top-section {
            padding: 24px;
            animation: fadeSlideDown 0.6s ease-out;
        }
        @keyframes fadeSlideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .back-btn {
            width: 44px;
            height: 44px;
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s;
        }
        .back-btn:hover {
            border-color: #FF6B6B;
            transform: rotate(-10deg);
        }
        
        .header-title {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 900;
            margin-left: 16px;
            letter-spacing: -1px;
        }
        
        .chat-container {
            padding: 24px;
            padding-bottom: 120px;
        }
        
        .message {
            margin-bottom: 20px;
            animation: fadeIn 0.5s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.user {
            text-align: right;
        }
        
        .message-content {
            display: inline-block;
            max-width: 80%;
            padding: 16px 20px;
            border-radius: 20px;
            font-size: 14px;
            line-height: 1.5;
        }
        
        .message.user .message-content {
            background: linear-gradient(135deg, #FF6B6B 0%, #FF8E8E 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .message.ai .message-content {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #F5F5F5;
            border-bottom-left-radius: 4px;
        }
        
        .ai-avatar {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #4ECDC4 0%, #6EE7DE 100%);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            margin-bottom: 8px;
        }
        
        .input-area {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            max-width: 375px;
            margin: 0 auto;
            background: rgba(10,10,10,0.9);
            border-top: 1px solid rgba(255,255,255,0.08);
            padding: 16px 24px 24px;
            backdrop-filter: blur(20px);
        }
        
        .input-box {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        
        .message-input {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 14px 20px;
            font-size: 14px;
            color: #F5F5F5;
        }
        .message-input:focus {
            outline: none;
            border-color: #4ECDC4;
        }
        .message-input::placeholder { color: rgba(255,255,255,0.3); }
        
        .send-btn {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #FF6B6B 0%, #4ECDC4 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s;
        }
        .send-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 24px rgba(255,107,107,0.3);
        }
    </style>
</head>
<body>
    <div class="top-section">
        <div class="header">
            <div class="back-btn">←</div>
            <div class="header-title">AI问答</div>
        </div>
    </div>
    
    <div class="chat-container">
        <div class="message ai">
            <div class="ai-avatar">◉</div>
            <div class="message-content">
                您好！我是您的健康助手，可以为您解答疾病、药品、症状等相关问题。请问有什么可以帮助您的？
            </div>
        </div>
        
        <div class="message user">
            <div class="message-content">
                高血压患者平时需要注意什么？
            </div>
        </div>
        
        <div class="message ai">
            <div class="ai-avatar">◉</div>
            <div class="message-content">
                高血压患者需要注意以下几点：<br><br>
                1. <strong>饮食管理</strong>：低盐低脂饮食，每日盐摄入不超过6克<br>
                2. <strong>规律运动</strong>：每周至少150分钟中等强度运动<br>
                3. <strong>按时服药</strong>：遵医嘱规律服药，不可自行停药<br>
                4. <strong>定期监测</strong>：每天测量血压并记录<br>
                5. <strong>戒烟限酒</strong>：避免吸烟，限制饮酒
            </div>
        </div>
    </div>
    
    <div class="input-area">
        <div class="input-box">
            <input type="text" class="message-input" placeholder="输入您的问题">
            <div class="send-btn">→</div>
        </div>
    </div>
    
    <script>
        document.querySelector('.back-btn').onclick = () => location.href = '首页_skill版.html';
        
        document.querySelector('.send-btn').onclick = function() {
            const input = document.querySelector('.message-input');
            if (input.value.trim()) {
                alert('AI回复：功能演示中');
                input.value = '';
            }
        };
    </script>
</body>
</html>
