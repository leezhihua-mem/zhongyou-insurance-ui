<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI问答 - Skill版</title>
    <link rel="stylesheet" href="colors.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', -apple-system, sans-serif;
            background: var(--bg-secondary);
            max-width: 375px;
            margin: 0 auto;
            min-height: 100vh;
            color: var(--text-primary);
        }
        body::before { content: ""; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(135deg, rgba(74,144,226,0.03) 0%, rgba(126,211,178,0.03) 100%); z-index: -1; }
        
        .top-section {
            padding: 24px;
            animation: fadeSlideDown 0.6s ease-out;
        }
        @keyframes fadeSlideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .back-btn {
            width: 44px;
            height: 44px;
            border: 2px solid var(--color-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s;
        }
        .back-btn:hover {
            border-color: var(--color-primary);
            transform: rotate(-10deg);
        }
        
        .header-title {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 900;
            margin-left: 16px;
            letter-spacing: -1px;
        }
        
        .chat-container {
            padding: 24px;
            padding-bottom: 120px;
        }
        
        .message {
            margin-bottom: 20px;
            animation: fadeIn 0.5s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.user {
            text-align: right;
        }
        
        .message-content {
            display: inline-block;
            max-width: 80%;
            padding: 16px 20px;
            border-radius: 20px;
            font-size: 14px;
            line-height: 1.5;
        }
        
        .message.user .message-content {
            background: linear-gradient(135deg, #FF6B6B 0%, #FF8E8E 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .message.ai .message-content {
            background: var(--bg-primary);
            border: 1px solid var(--border-light);
            color: var(--text-primary);
            border-bottom-left-radius: 4px;
        }
        
        .ai-avatar {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #4ECDC4 0%, #6EE7DE 100%);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            margin-bottom: 8px;
        }
        
        .input-area {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            max-width: 375px;
            margin: 0 auto;
            background: rgba(10,10,10,0.9);
            border-top: 1px solid rgba(255,255,255,0.08);
            padding: 16px 24px 24px;
            backdrop-filter: blur(20px);
        }
        
        .input-box {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        
        .message-input {
            flex: 1;
            background: var(--bg-primary);
            border: 1px solid var(--border-light);
            border-radius: 24px;
            padding: 14px 20px;
            font-size: 14px;
            color: var(--text-primary);
        }
        .message-input:focus {
            outline: none;
            border-color: var(--color-primary);
        }
        .message-input::placeholder { color: var(--text-tertiary); }
        
        .send-btn {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #FF6B6B 0%, #4ECDC4 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s;
        }
        .send-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 24px rgba(255,107,107,0.3);
        }
    </style>
</head>
<body>
    <div class="top-section">
        <div class="header">
            <div class="back-btn">←</div>
            <div class="header-title">AI问答</div>
        </div>
    </div>
    
    <div class="chat-container">
        <div class="message ai">
            <div class="ai-avatar">◉</div>
            <div class="message-content">
                您好！我是您的健康助手，可以为您解答疾病、药品、症状等相关问题。请问有什么可以帮助您的？
            </div>
        </div>
        
        <div class="message user">
            <div class="message-content">
                高血压患者平时需要注意什么？
            </div>
        </div>
        
        <div class="message ai">
            <div class="ai-avatar">◉</div>
            <div class="message-content">
                高血压患者需要注意以下几点：<br><br>
                1. <strong>饮食管理</strong>：低盐低脂饮食，每日盐摄入不超过6克<br>
                2. <strong>规律运动</strong>：每周至少150分钟中等强度运动<br>
                3. <strong>按时服药</strong>：遵医嘱规律服药，不可自行停药<br>
                4. <strong>定期监测</strong>：每天测量血压并记录<br>
                5. <strong>戒烟限酒</strong>：避免吸烟，限制饮酒
            </div>
        </div>
    </div>
    
    <div class="input-area">
        <div class="input-box">
            <input type="text" class="message-input" placeholder="输入您的问题">
            <div class="send-btn">→</div>
        </div>
    </div>
    
    <script>
        document.querySelector('.back-btn').onclick = () => location.href = '首页_skill版.html';
        
        // AI知识库
        const knowledgeBase = {
            '高血压': {
                keywords: ['高血压', '血压高', '降压'],
                answer: '高血压患者需要注意：<br><br>1. <strong>饮食管理</strong>：低盐低脂饮食，每日盐摄入不超过6克<br>2. <strong>规律运动</strong>：每周至少150分钟中等强度运动<br>3. <strong>按时服药</strong>：遵医嘱规律服药，不可自行停药<br>4. <strong>定期监测</strong>：每天测量血压并记录<br>5. <strong>戒烟限酒</strong>：避免吸烟，限制饮酒'
            },
            '糖尿病': {
                keywords: ['糖尿病', '血糖', '降糖'],
                answer: '糖尿病患者需要注意：<br><br>1. <strong>饮食控制</strong>：控制碳水摄入，选择低GI食物<br>2. <strong>规律运动</strong>：每周至少150分钟中等强度运动<br>3. <strong>血糖监测</strong>：定期监测空腹和餐后血糖<br>4. <strong>按时服药</strong>：遵医嘱规律服药或注射胰岛素<br>5. <strong>足部护理</strong>：每天检查足部，避免受伤'
            },
            '感冒': {
                keywords: ['感冒', '发烧', '咳嗽', '流鼻涕'],
                answer: '感冒患者建议：<br><br>1. <strong>多休息</strong>：保证充足睡眠<br>2. <strong>多喝水</strong>：每日饮水2000-3000ml<br>3. <strong>对症用药</strong>：发热可用布洛芬，咳嗽可用止咳药<br>4. <strong>注意隔离</strong>：避免传染他人<br>5. <strong>及时就医</strong>：症状持续超过1周或加重时就医'
            },
            '胃痛': {
                keywords: ['胃痛', '胃病', '胃溃疡', '胃炎'],
                answer: '胃病患者建议：<br><br>1. <strong>规律饮食</strong>：定时定量进食，避免过饱<br>2. <strong>饮食禁忌</strong>：避免辛辣、油腻、生冷食物<br>3. <strong>戒烟限酒</strong>：烟酒会刺激胃黏膜<br>4. <strong>减压</strong>：避免精神紧张和焦虑<br>5. <strong>及时就医</strong>：疼痛持续或加重时就医'
            },
            '失眠': {
                keywords: ['失眠', '睡不着', '睡眠'],
                answer: '改善失眠建议：<br><br>1. <strong>规律作息</strong>：固定睡眠和起床时间<br>2. <strong>睡眠环境</strong>：安静、黑暗、温度适宜<br>3. <strong>睡前准备</strong>：避免咖啡、浓茶、剧烈运动<br>4. <strong>放松技巧</strong>：深呼吸、冥想、热水澡<br>5. <strong>避免午睡</strong>：白天午睡不超过30分钟'
            }
        };
        
        // 发送消息
        document.querySelector('.send-btn').onclick = sendMessage;
        document.querySelector('.message-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });
        
        function sendMessage() {
            const input = document.querySelector('.message-input');
            const message = input.value.trim();
            if (!message) return;
            
            // 显示用户消息
            addMessage(message, 'user');
            input.value = '';
            
            // 匹配知识库
            setTimeout(() => {
                const answer = findAnswer(message);
                addMessage(answer, 'ai');
            }, 500);
        }
        
        // 查找答案
        function findAnswer(question) {
            for (const [disease, data] of Object.entries(knowledgeBase)) {
                if (data.keywords.some(keyword => question.includes(keyword))) {
                    return data.answer;
                }
            }
            
            // 默认回复
            return '感谢您的提问！我已记录您的问题。如需更详细的解答，建议咨询专业医生。您也可以尝试问我关于高血压、糖尿病、感冒、胃痛、失眠等问题。';
        }
        
        // 添加消息
        function addMessage(text, type) {
            const container = document.querySelector('.chat-container');
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            
            if (type === 'ai') {
                messageDiv.innerHTML = `
                    <div class="ai-avatar">◉</div>
                    <div class="message-content">${text}</div>
                `;
            } else {
                messageDiv.innerHTML = `<div class="message-content">${text}</div>`;
            }
            
            container.appendChild(messageDiv);
            container.scrollTop = container.scrollHeight;
            
            // 滚动到新消息
            window.scrollTo(0, document.body.scrollHeight);
        }
    </script>
</body>
</html>
