<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>药品详情 - UI原型</title>
    <style>
        /* Notion风格 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: #ffffff;
            max-width: 375px;
            margin: 0 auto;
            min-height: 100vh;
            color: rgba(0,0,0,0.95);
        }
        
        .header {
            background: #2a9d99;
            color: #fff;
            padding: 16px;
            display: flex;
            align-items: center;
        }
        
        .back-btn { font-size: 20px; margin-right: 12px; cursor: pointer; color: #fff; }
        .header-title { font-size: 16px; font-weight: 600; }
        
        .disclaimer {
            background: #fff8e6;
            border: 1px solid rgba(0,0,0,0.1);
            padding: 8px 12px;
            margin: 8px;
            border-radius: 4px;
            font-size: 12px;
            color: #856404;
        }
        
        .drug-header {
            padding: 16px;
            background: #f6f5f4;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }
        
        .drug-name {
            font-size: 18px;
            font-weight: 600;
        }
        
        .drug-category {
            font-size: 12px;
            color: #615d59;
            margin-top: 4px;
        }
        
        .section {
            padding: 16px;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }
        
        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: #2a9d99;
            margin-bottom: 12px;
        }
        
        .section-content {
            font-size: 13px;
            color: rgba(0,0,0,0.95);
            line-height: 1.5;
        }
        
        .warning-box {
            background: #fff3e0;
            border: 1px solid rgba(0,0,0,0.1);
            padding: 12px;
            border-radius: 4px;
            margin-top: 8px;
        }
        
        .warning-title {
            font-size: 12px;
            font-weight: 600;
            color: #dd5b00;
            margin-bottom: 8px;
        }
        
        .warning-item {
            font-size: 12px;
            color: rgba(0,0,0,0.95);
            padding: 4px 0;
        }
        
        .usage-table {
            background: #f6f5f4;
            padding: 12px;
            border-radius: 4px;
            margin-top: 8px;
        }
        
        .usage-row {
            display: flex;
            padding: 8px 0;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }
        
        .usage-row:last-child { border-bottom: none; }
        
        .usage-label {
            width: 80px;
            font-size: 12px;
            color: #615d59;
        }
        
        .usage-value {
            font-size: 13px;
            color: rgba(0,0,0,0.95);
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="back-btn">←</div>
        <div class="header-title">药品详情</div>
    </div>
    
    <div class="disclaimer">⚠️ 本资料仅供参考，用药前请咨询医师或药师。</div>
    
    <div class="drug-header">
        <div class="drug-name">氨氯地平片</div>
        <div class="drug-category">钙拮抗剂 | 降压药 | 处方药</div>
    </div>
    
    <div class="section">
        <div class="section-title">适应症</div>
        <div class="section-content">
            高血压、冠心病、心绞痛。
        </div>
    </div>
    
    <div class="section">
        <div class="section-title">用法用量</div>
        <div class="usage-table">
            <div class="usage-row">
                <div class="usage-label">成人剂量</div>
                <div class="usage-value">5-10mg/日，一次口服</div>
            </div>
            <div class="usage-row">
                <div class="usage-label">服药时间</div>
                <div class="usage-value">早晨空腹或餐后均可</div>
            </div>
            <div class="usage-row">
                <div class="usage-label">疗程</div>
                <div class="usage-value">长期服用，遵医嘱调整</div>
            </div>
        </div>
    </div>
    
    <div class="section">
        <div class="section-title">禁忌与慎用</div>
        <div class="warning-box">
            <div class="warning-title">⚠️ 以下情况禁用或慎用</div>
            <div class="warning-item">• 对本品过敏者禁用</div>
            <div class="warning-item">• 重度肝功能不全慎用</div>
            <div class="warning-item">• 孕妇、哺乳期妇女慎用</div>
        </div>
    </div>
    
    <div class="section">
        <div class="section-title">不良反应</div>
        <div class="section-content">
            头痛、面部潮红、水肿、乏力、恶心等。若症状严重请就医。
        </div>
    </div>
    
    <script>
        document.querySelector('.back-btn').addEventListener('click', () => location.href = 'index.html');
    </script>
</body>
</html>
