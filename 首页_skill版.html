<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用药与疾病知识手册 - Skill版</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'DM Sans', -apple-system, sans-serif;
            background: #0A0A0A;
            max-width: 375px;
            margin: 0 auto;
            min-height: 100vh;
            color: #F5F5F5;
            overflow-x: hidden;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(255,107,107,0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(78,205,196,0.08) 0%, transparent 50%);
            z-index: -1;
        }
        
        /* 顶部 */
        .header {
            padding: 40px 24px 48px;
            text-align: center;
            animation: fadeSlideDown 0.6s ease-out;
        }
        
        @keyframes fadeSlideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .header-title {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 900;
            margin-bottom: 8px;
            letter-spacing: -1px;
        }
        
        .header-subtitle {
            font-size: 14px;
            color: rgba(255,255,255,0.5);
        }
        
        /* 免责声明 */
        .disclaimer {
            background: rgba(255,107,107,0.08);
            border-left: 3px solid #FF6B6B;
            padding: 16px 24px;
            margin: 24px;
            font-size: 13px;
            color: rgba(255,255,255,0.8);
            line-height: 1.5;
            animation: fadeIn 0.5s ease-out 0.1s both;
        }
        
        /* 搜索框 */
        .search-box {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 28px;
            padding: 18px 24px;
            margin: 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all 0.3s;
            animation: fadeIn 0.5s ease-out 0.2s both;
        }
        
        .search-box:focus-within {
            border-color: #4ECDC4;
            background: rgba(78,205,196,0.05);
            box-shadow: 0 0 32px rgba(78,205,196,0.2);
        }
        
        .search-icon { font-size: 22px; color: #4ECDC4; }
        
        .search-input {
            flex: 1;
            background: transparent;
            border: none;
            font-size: 16px;
            color: #F5F5F5;
        }
        
        .search-input:focus { outline: none; }
        .search-input::placeholder { color: rgba(255,255,255,0.3); }
        
        /* 功能模块 */
        .modules {
            padding: 24px;
            animation: fadeIn 0.5s ease-out 0.3s both;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .section-title {
            font-size: 16px;
            font-weight: 700;
            color: #F5F5F5;
            margin-bottom: 20px;
        }
        
        .module-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }
        
        .module-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s;
            animation: fadeIn 0.5s ease-out both;
        }
        
        .module-card:nth-child(1) { animation-delay: 0.4s; }
        .module-card:nth-child(2) { animation-delay: 0.5s; }
        .module-card:nth-child(3) { animation-delay: 0.6s; }
        .module-card:nth-child(4) { animation-delay: 0.7s; }
        .module-card:nth-child(5) { animation-delay: 0.8s; }
        .module-card:nth-child(6) { animation-delay: 0.9s; }
        
        .module-card:hover {
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.15);
            transform: translateY(-4px);
        }
        
        .module-icon {
            width: 48px;
            height: 48px;
            margin: 0 auto 16px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            background: linear-gradient(135deg, rgba(255,107,107,0.2) 0%, rgba(78,205,196,0.2) 100%);
        }
        
        .module-title {
            font-size: 14px;
            font-weight: 600;
            color: #F5F5F5;
            margin-bottom: 6px;
        }
        
        .module-desc {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
        }
        
        /* 热门查询 */
        .hot-queries {
            padding: 24px;
            animation: fadeIn 0.5s ease-out 1s both;
        }
        
        .hot-list {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 20px;
        }
        
        .hot-item {
            display: flex;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .hot-item:last-child { border-bottom: none; }
        
        .hot-item:hover { transform: translateX(8px); }
        
        .hot-rank {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            text-align: center;
            line-height: 28px;
            font-size: 12px;
            font-weight: 700;
            margin-right: 16px;
        }
        
        .hot-rank.top1 { background: #FF6B6B; color: white; }
        .hot-rank.top2 { background: #4ECDC4; color: white; }
        .hot-rank.top3 { background: linear-gradient(135deg, #FF6B6B, #4ECDC4); color: white; }
        .hot-rank.normal { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.5); }
        
        .hot-text {
            font-size: 14px;
            color: rgba(255,255,255,0.8);
        }
        
        /* 底部导航 */
        .footer-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            max-width: 375px;
            margin: 0 auto;
            background: rgba(10,10,10,0.9);
            border-top: 1px solid rgba(255,255,255,0.08);
            display: flex;
            justify-content: space-around;
            padding: 16px 0 24px;
            backdrop-filter: blur(20px);
        }
        
        .nav-item {
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .nav-item:hover { transform: scale(1.15); }
        
        .nav-icon {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 6px;
            border-radius: 12px;
            background: rgba(255,255,255,0.05);
            font-size: 16px;
            transition: all 0.3s;
        }
        
        .nav-item:hover .nav-icon { background: rgba(255,255,255,0.1); }
        .nav-item.active .nav-icon { background: linear-gradient(135deg, #FF6B6B, #4ECDC4); }
        
        .nav-text {
            font-size: 11px;
            color: rgba(255,255,255,0.4);
        }
        
        .nav-item.active .nav-text { color: #F5F5F5; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-title">用药与疾病知识手册</div>
        <div class="header-subtitle">您的健康查询助手</div>
    </div>
    
    <div class="disclaimer">
        ⚠️ 本资料仅供参考，不能替代专业医师的诊疗建议。如有不适，请及时就医。
    </div>
    
    <div class="search-box">
        <span class="search-icon">⊙</span>
        <input type="text" class="search-input" placeholder="搜索疾病、症状或药品">
    </div>
    
    <div class="modules">
        <div class="section-title">核心功能</div>
        <div class="module-grid">
            <div class="module-card">
                <div class="module-icon">◎</div>
                <div class="module-title">症状自查</div>
                <div class="module-desc">智能分析可能病因</div>
            </div>
            <div class="module-card">
                <div class="module-icon">◇</div>
                <div class="module-title">疾病百科</div>
                <div class="module-desc">200+疾病知识库</div>
            </div>
            <div class="module-card">
                <div class="module-icon">●</div>
                <div class="module-title">药品查询</div>
                <div class="module-desc">300+常用药品</div>
            </div>
            <div class="module-card">
                <div class="module-icon">⏱</div>
                <div class="module-title">用药提醒</div>
                <div class="module-desc">服药计划管理</div>
            </div>
            <div class="module-card">
                <div class="module-icon">◉</div>
                <div class="module-title">AI问答</div>
                <div class="module-desc">智能健康助手</div>
            </div>
            <div class="module-card">
                <div class="module-icon">≡</div>
                <div class="module-title">查询记录</div>
                <div class="module-desc">历史查询回顾</div>
            </div>
        </div>
    </div>
    
    <div class="hot-queries">
        <div class="section-title">热门查询 TOP10</div>
        <div class="hot-list">
            <div class="hot-item">
                <div class="hot-rank top1">1</div>
                <div class="hot-text">高血压症状及治疗</div>
            </div>
            <div class="hot-item">
                <div class="hot-rank top2">2</div>
                <div class="hot-text">糖尿病患者饮食禁忌</div>
            </div>
            <div class="hot-item">
                <div class="hot-rank top3">3</div>
                <div class="hot-text">感冒发烧吃什么药</div>
            </div>
            <div class="hot-item">
                <div class="hot-rank normal">4</div>
                <div class="hot-text">头痛原因分析</div>
            </div>
            <div class="hot-item">
                <div class="hot-rank normal">5</div>
                <div class="hot-text">胃溃疡饮食调理</div>
            </div>
        </div>
    </div>
    
    <div class="footer-nav">
        <div class="nav-item active">
            <div class="nav-icon">⌂</div>
            <div class="nav-text">首页</div>
        </div>
        <div class="nav-item">
            <div class="nav-icon">◎</div>
            <div class="nav-text">查询</div>
        </div>
        <div class="nav-item">
            <div class="nav-icon">⏱</div>
            <div class="nav-text">提醒</div>
        </div>
        <div class="nav-item">
            <div class="nav-icon">◉</div>
            <div class="nav-text">我的</div>
        </div>
    </div>
    
    <script>
        document.querySelectorAll('.module-card').forEach(card => {
            card.onclick = function() {
                const title = this.querySelector('.module-title').textContent;
                const pageMap = {
                    '症状自查': '症状自查_skill版.html',
                    '疾病百科': '疾病百科_skill版.html',
                    '药品查询': '药品查询_skill版.html',
                    '用药提醒': '用药提醒_skill版.html',
                    'AI问答': 'AI问答_skill版.html',
                    '查询记录': '查询记录_skill版.html'
                };
                if (pageMap[title]) location.href = pageMap[title];
            };
        });
        
        document.querySelectorAll('.hot-item').forEach(item => {
            item.onclick = function() {
                location.href = '疾病详情_skill版.html';
            };
        });
        
        document.querySelectorAll('.nav-item').forEach(item => {
            item.onclick = function() {
                const text = this.querySelector('.nav-text').textContent;
                if (text === '首页') return;
                if (text === '查询') location.href = '症状自查_skill版.html';
                if (text === '提醒') location.href = '用药提醒_skill版.html';
            };
        });
    </script>
</body>
</html>
