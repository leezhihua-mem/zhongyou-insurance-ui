<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>查询记录 - Skill版</title>
    <link rel="stylesheet" href="colors.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', -apple-system, sans-serif;
            background: var(--bg-secondary);
            max-width: 375px;
            margin: 0 auto;
            min-height: 100vh;
            color: var(--text-primary);
        }
        body::before { content: ""; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(135deg, rgba(74,144,226,0.03) 0%, rgba(126,211,178,0.03) 100%); z-index: -1; }
        
        .top-section {
            padding: 24px;
            animation: fadeSlideDown 0.6s ease-out;
        }
        @keyframes fadeSlideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        
        .back-btn {
            width: 44px;
            height: 44px;
            border: 2px solid var(--color-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s;
        }
        .back-btn:hover {
            border-color: var(--color-primary);
            transform: rotate(-10deg);
        }
        
        .header-title {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 900;
            letter-spacing: -1px;
        }
        
        .clear-btn {
            padding: 10px 20px;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 20px;
            color: rgba(255,255,255,0.6);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .clear-btn:hover {
            border-color: var(--color-primary);
            color: var(--color-primary);
        }
        
        .history-list {
            padding: 24px;
            padding-bottom: 100px;
        }
        
        .date-group {
            margin-bottom: 32px;
            animation: fadeIn 0.5s ease-out both;
        }
        .date-group:nth-child(1) { animation-delay: 0.2s; }
        .date-group:nth-child(2) { animation-delay: 0.3s; }
        .date-group:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .date-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 16px;
            padding-left: 8px;
            border-left: 3px solid #4ECDC4;
        }
        
        .history-item {
            background: var(--bg-primary);
            border: 1px solid var(--border-light);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.4s;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .history-item:hover {
            background: rgba(255,255,255,0.06);
            border-color: rgba(255,255,255,0.15);
            transform: translateX(8px);
        }
        
        .history-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        .icon-drug {
            background: rgba(78,205,196,0.15);
            color: var(--color-primary);
        }
        .icon-disease {
            background: rgba(255,107,107,0.15);
            color: var(--color-primary);
        }
        .icon-symptom {
            background: rgba(255,255,255,0.08);
            color: var(--text-primary);
        }
        
        .history-content {
            flex: 1;
        }
        
        .history-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }
        
        .history-time {
            font-size: 12px;
            color: var(--text-secondary);
        }
        
        .arrow {
            font-size: 16px;
            color: rgba(255,255,255,0.2);
        }
        
        .footer-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            max-width: 375px;
            margin: 0 auto;
            background: rgba(10,10,10,0.9);
            border-top: 1px solid rgba(255,255,255,0.08);
            display: flex;
            justify-content: space-around;
            padding: 16px 0 24px;
            backdrop-filter: blur(20px);
        }
        
        .nav-item {
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .nav-item:hover { transform: scale(1.15); }
        
        .nav-icon {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 6px;
            border-radius: 12px;
            background: var(--bg-primary);
            font-size: 16px;
        }
        .nav-item:hover .nav-icon { background: rgba(255,255,255,0.1); }
        .nav-item.active .nav-icon { background: linear-gradient(135deg, #FF6B6B, #4ECDC4); }
        
        .nav-text {
            font-size: 11px;
            color: var(--text-secondary);
        }
        .nav-item.active .nav-text { color: var(--text-primary); }
    </style>
</head>
<body>
    <div class="top-section">
        <div class="header">
            <div class="back-btn">←</div>
            <div class="header-title">查询记录</div>
            <div class="clear-btn">清空</div>
        </div>
    </div>
    
    <div class="history-list">
        <div class="date-group">
            <div class="date-title">今天</div>
            
            <div class="history-item">
                <div class="history-icon icon-drug">●</div>
                <div class="history-content">
                    <div class="history-title">氨氯地平片</div>
                    <div class="history-time">药品查询 · 10:30</div>
                </div>
                <div class="arrow">→</div>
            </div>
            
            <div class="history-item">
                <div class="history-icon icon-disease">◇</div>
                <div class="history-content">
                    <div class="history-title">高血压</div>
                    <div class="history-time">疾病百科 · 09:15</div>
                </div>
                <div class="arrow">→</div>
            </div>
        </div>
        
        <div class="date-group">
            <div class="date-title">昨天</div>
            
            <div class="history-item">
                <div class="history-icon icon-symptom">◎</div>
                <div class="history-content">
                    <div class="history-title">头痛、发热</div>
                    <div class="history-time">症状自查 · 15:20</div>
                </div>
                <div class="arrow">→</div>
            </div>
            
            <div class="history-item">
                <div class="history-icon icon-drug">●</div>
                <div class="history-content">
                    <div class="history-title">布洛芬缓释胶囊</div>
                    <div class="history-time">药品查询 · 14:05</div>
                </div>
                <div class="arrow">→</div>
            </div>
        </div>
    </div>
    
    <div class="footer-nav">
        <div class="nav-item">
            <div class="nav-icon">⌂</div>
            <div class="nav-text">首页</div>
        </div>
        <div class="nav-item">
            <div class="nav-icon">◎</div>
            <div class="nav-text">查询</div>
        </div>
        <div class="nav-item">
            <div class="nav-icon">⏱</div>
            <div class="nav-text">提醒</div>
        </div>
        <div class="nav-item active">
            <div class="nav-icon">◉</div>
            <div class="nav-text">我的</div>
        </div>
    </div>
    
    <script>
        document.querySelector('.back-btn').onclick = () => location.href = '首页_skill版.html';
        
        // 加载查询记录
        loadQueryRecords();
        
        function loadQueryRecords() {
            const records = JSON.parse(localStorage.getItem('queryRecords') || '[]');
            const container = document.querySelector('.history-list');
            
            if (records.length === 0) {
                container.innerHTML = '<p style="text-align:center;color:var(--text-tertiary);padding:60px;">暂无查询记录</p>';
                return;
            }
            
            // 按日期分组
            const grouped = groupByDate(records);
            
            container.innerHTML = Object.entries(grouped).map(([date, items]) => `
                <div class="date-group">
                    <div class="date-title">${date}</div>
                    ${items.map(item => `
                        <div class="history-item">
                            <div class="history-icon icon-${item.type === '药品' ? 'drug' : item.type === '疾病' ? 'disease' : 'symptom'}">●</div>
                            <div class="history-content">
                                <div class="history-title">${item.name}</div>
                                <div class="history-time">${item.type}查询 · ${formatTime(item.time)}</div>
                            </div>
                            <div class="arrow">→</div>
                        </div>
                    `).join('')}
                </div>
            `).join('');
            
            // 绑定点击事件
            container.querySelectorAll('.history-item').forEach(item => {
                item.onclick = function() {
                    const title = this.querySelector('.history-title').textContent;
                    const type = this.querySelector('.history-time').textContent.includes('药品') ? 'drug' :
                                 this.querySelector('.history-time').textContent.includes('疾病') ? 'disease' : 'symptom';
                    
                    if (type === 'drug') {
                        location.href = '药品详情_skill版.html';
                    } else {
                        location.href = '疾病详情_skill版.html';
                    }
                };
            });
        }
        
        // 按日期分组
        function groupByDate(records) {
            const grouped = {};
            const today = new Date().toDateString();
            const yesterday = new Date(Date.now() - 86400000).toDateString();
            
            records.forEach(record => {
                const date = new Date(record.time);
                let dateStr;
                
                if (date.toDateString() === today) {
                    dateStr = '今天';
                } else if (date.toDateString() === yesterday) {
                    dateStr = '昨天';
                } else {
                    dateStr = date.toLocaleDateString('zh-CN', {month: 'long', day: 'numeric'});
                }
                
                if (!grouped[dateStr]) grouped[dateStr] = [];
                grouped[dateStr].push(record);
            });
            
            return grouped;
        }
        
        // 格式化时间
        function formatTime(isoString) {
            const date = new Date(isoString);
            return date.toLocaleTimeString('zh-CN', {hour: '2-digit', minute: '2-digit'});
        }
        
        // 清空记录
        document.querySelector('.clear-btn').onclick = () => {
            if (confirm('确定清空所有查询记录？')) {
                localStorage.removeItem('queryRecords');
                loadQueryRecords();
                showToast('记录已清空');
            }
        };
        
        // Toast提示
        function showToast(message) {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                bottom: 100px;
                left: 50%;
                transform: translateX(-50%);
                background: rgba(0,0,0,0.8);
                color: white;
                padding: 12px 24px;
                border-radius: 24px;
                font-size: 14px;
                z-index: 2000;
            `;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }
    </script>
</body>
</html>
