<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>症状自查 - UI原型</title>
    <style>
        /* Notion风格 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: #ffffff;
            max-width: 375px;
            margin: 0 auto;
            min-height: 100vh;
            color: rgba(0,0,0,0.95);
        }
        
        /* 头部 */
        .header {
            background: #0075de;
            color: #ffffff;
            padding: 16px;
            display: flex;
            align-items: center;
        }
        
        .back-btn {
            font-size: 20px;
            margin-right: 12px;
            cursor: pointer;
            color: #fff;
        }
        
        .header-title {
            font-size: 16px;
            font-weight: 600;
        }
        
        /* 免责声明 */
        .disclaimer {
            background: #fff8e6;
            border: 1px solid rgba(0,0,0,0.1);
            padding: 8px 12px;
            margin: 8px;
            border-radius: 4px;
            font-size: 12px;
            color: #856404;
        }
        
        /* 人体部位选择 */
        .body-selector {
            background: #f6f5f4;
            border: 1px solid rgba(0,0,0,0.1);
            margin: 12px;
            padding: 16px;
            border-radius: 4px;
        }
        
        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: rgba(0,0,0,0.95);
            margin-bottom: 12px;
        }
        
        .body-parts {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .body-part {
            padding: 6px 12px;
            background: #ffffff;
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: 9999px;
            font-size: 13px;
            color: #615d59;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .body-part:hover {
            background: #f2f9ff;
            border-color: #097fe8;
        }
        
        .body-part.active {
            background: #0075de;
            color: #ffffff;
            border-color: #0075de;
        }
        
        /* 症状选择 */
        .symptom-selector {
            background: #f6f5f4;
            border: 1px solid rgba(0,0,0,0.1);
            margin: 12px;
            padding: 16px;
            border-radius: 4px;
        }
        
        .symptoms {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .symptom-item {
            display: flex;
            align-items: center;
            padding: 12px;
            background: #ffffff;
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: 4px;
            cursor: pointer;
        }
        
        .symptom-item:hover {
            background: #f6f5f4;
        }
        
        .symptom-item.selected {
            background: #f2f9ff;
            border-color: #097fe8;
        }
        
        .symptom-checkbox {
            width: 18px;
            height: 18px;
            border: 1px solid rgba(0,0,0,0.2);
            border-radius: 4px;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .symptom-item.selected .symptom-checkbox {
            background: #0075de;
            border-color: #0075de;
            color: #fff;
        }
        
        .symptom-text {
            font-size: 13px;
            color: rgba(0,0,0,0.95);
        }
        
        /* 分析按钮 */
        .analyze-btn {
            background: #0075de;
            color: #ffffff;
            padding: 12px 24px;
            margin: 16px 12px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
            text-align: center;
            cursor: pointer;
            border: none;
        }
        
        .analyze-btn:hover {
            background: #005bab;
        }
        
        /* 分析结果 */
        .result {
            background: #f6f5f4;
            border: 1px solid rgba(0,0,0,0.1);
            margin: 12px;
            padding: 16px;
            border-radius: 4px;
        }
        
        .result-title {
            font-size: 14px;
            font-weight: 600;
            color: #0075de;
            margin-bottom: 12px;
        }
        
        .result-item {
            padding: 8px 0;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }
        
        .result-item:last-child {
            border-bottom: none;
        }
        
        .result-name {
            font-size: 13px;
            font-weight: 500;
            color: rgba(0,0,0,0.95);
        }
        
        .result-desc {
            font-size: 12px;
            color: #615d59;
            margin-top: 4px;
        }
        
        .result-action {
            display: inline-block;
            padding: 4px 8px;
            background: #e3f2ff;
            border-radius: 4px;
            font-size: 11px;
            color: #0075de;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <!-- 头部 -->
    <div class="header">
        <div class="back-btn">←</div>
        <div class="header-title">症状自查</div>
    </div>
    
    <!-- 免责声明 -->
    <div class="disclaimer">
        ⚠️ 本功能仅供参考，不能替代专业医师的诊断。
    </div>
    
    <!-- 身体部位选择 -->
    <div class="body-selector">
        <div class="section-title">选择不适部位</div>
        <div class="body-parts">
            <div class="body-part active">头部</div>
            <div class="body-part">胸部</div>
            <div class="body-part">腹部</div>
            <div class="body-part">四肢</div>
            <div class="body-part">皮肤</div>
            <div class="body-part">全身</div>
        </div>
    </div>
    
    <!-- 症状选择 -->
    <div class="symptom-selector">
        <div class="section-title">选择具体症状（可多选）</div>
        <div class="symptoms">
            <div class="symptom-item selected">
                <div class="symptom-checkbox">✓</div>
                <div class="symptom-text">头痛</div>
            </div>
            <div class="symptom-item">
                <div class="symptom-checkbox"></div>
                <div class="symptom-text">头晕</div>
            </div>
            <div class="symptom-item">
                <div class="symptom-checkbox"></div>
                <div class="symptom-text">发热</div>
            </div>
            <div class="symptom-item">
                <div class="symptom-checkbox"></div>
                <div class="symptom-text">乏力</div>
            </div>
            <div class="symptom-item">
                <div class="symptom-checkbox"></div>
                <div class="symptom-text">失眠</div>
            </div>
        </div>
    </div>
    
    <!-- 分析按钮 -->
    <div class="analyze-btn">智能分析</div>
    
    <!-- 分析结果 -->
    <div class="result" style="display: block;">
        <div class="result-title">可能的疾病（仅供参考）</div>
        <div class="result-item">
            <div class="result-name">高血压</div>
            <div class="result-desc">匹配度：85% | 建议：监测血压，必要时就医</div>
            <div class="result-action">查看详情 →</div>
        </div>
        <div class="result-item">
            <div class="result-name">感冒</div>
            <div class="result-desc">匹配度：60% | 建议：休息观察，症状加重就医</div>
            <div class="result-action">查看详情 →</div>
        </div>
    </div>
    
    <script>
        // 返回按钮
        document.querySelector('.back-btn').addEventListener('click', () => {
            location.href = 'index.html';
        });
        
        // 身体部位选择
        document.querySelectorAll('.body-part').forEach(part => {
            part.addEventListener('click', function() {
                document.querySelectorAll('.body-part').forEach(p => p.classList.remove('active'));
                this.classList.add('active');
            });
        });
        
        // 症状多选
        document.querySelectorAll('.symptom-item').forEach(item => {
            item.addEventListener('click', function() {
                this.classList.toggle('selected');
                const checkbox = this.querySelector('.symptom-checkbox');
                checkbox.textContent = this.classList.contains('selected') ? '✓' : '';
            });
        });
        
        // 分析按钮
        document.querySelector('.analyze-btn').addEventListener('click', () => {
            alert('已选择症状，正在进行智能分析...');
        });
        
        // 点击结果跳转
        document.querySelectorAll('.result-action').forEach(action => {
            action.addEventListener('click', () => {
                location.href = 'UI原型_疾病详情.html';
            });
        });
    </script>
</body>
</html>
