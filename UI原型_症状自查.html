<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>症状自查 - UI原型</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: #f5f5f5;
            max-width: 375px;
            margin: 0 auto;
            min-height: 100vh;
        }
        
        /* 头部 */
        .header {
            background: linear-gradient(135deg, #1976D2 0%, #1565C0 100%);
            color: white;
            padding: 16px;
            display: flex;
            align-items: center;
        }
        
        .back-btn {
            font-size: 24px;
            margin-right: 12px;
            cursor: pointer;
        }
        
        .header-title {
            font-size: 18px;
            font-weight: 600;
        }
        
        /* 免责声明 */
        .disclaimer {
            background: #FFF3CD;
            padding: 8px 12px;
            margin: 8px;
            border-radius: 6px;
            font-size: 12px;
            color: #856404;
        }
        
        /* 人体部位选择 */
        .body-selector {
            background: white;
            margin: 12px;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        
        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 16px;
        }
        
        .body-parts {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .body-part {
            padding: 8px 16px;
            background: #E3F2FD;
            border: 1px solid #BBDEFB;
            border-radius: 20px;
            font-size: 14px;
            color: #1976D2;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .body-part:hover,
        .body-part.selected {
            background: #1976D2;
            color: white;
        }
        
        /* 症状选择 */
        .symptom-selector {
            background: white;
            margin: 12px;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        
        .symptom-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .symptom-tag {
            padding: 6px 12px;
            background: #F3E5F5;
            border: 1px solid #E1BEE7;
            border-radius: 16px;
            font-size: 13px;
            color: #7B1FA2;
            cursor: pointer;
        }
        
        .symptom-tag:hover,
        .symptom-tag.selected {
            background: #7B1FA2;
            color: white;
        }
        
        /* 自定义输入 */
        .custom-input {
            background: white;
            margin: 12px;
            padding: 16px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        
        .custom-textarea {
            width: 100%;
            height: 80px;
            border: 1px solid #E0E0E0;
            border-radius: 8px;
            padding: 12px;
            font-size: 14px;
            resize: none;
        }
        
        .custom-textarea:focus {
            outline: none;
            border-color: #1976D2;
        }
        
        /* 查询按钮 */
        .query-btn {
            background: linear-gradient(135deg, #1976D2 0%, #1565C0 100%);
            color: white;
            margin: 16px 12px;
            padding: 14px;
            border-radius: 25px;
            text-align: center;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(25,118,210,0.3);
        }
        
        /* 结果预览 */
        .result-preview {
            background: white;
            margin: 12px;
            padding: 16px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        
        .result-header {
            font-size: 15px;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #F0F0F0;
        }
        
        .disease-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #F0F0F0;
        }
        
        .disease-name {
            font-size: 14px;
            color: #333;
        }
        
        .disease-prob {
            font-size: 13px;
            color: #1976D2;
            font-weight: 600;
        }
        
        .disease-prob.high { color: #F44336; }
        .disease-prob.medium { color: #FF9800; }
        .disease-prob.low { color: #4CAF50; }
        
        .urgent-tip {
            background: #FFEBEE;
            border: 1px solid #FFCDD2;
            padding: 12px;
            margin: 12px 0;
            border-radius: 8px;
            font-size: 13px;
            color: #C62828;
        }
        
        /* 底部 */
        .footer {
            padding: 20px 12px;
            text-align: center;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>
    <!-- 头部 -->
    <div class="header">
        <div class="back-btn">←</div>
        <div class="header-title">症状自查</div>
    </div>
    
    <!-- 免责声明 -->
    <div class="disclaimer">
        ⚠️ 本功能仅供参考，如有紧急症状请立即就医
    </div>
    
    <!-- 身体部位选择 -->
    <div class="body-selector">
        <div class="section-title">1. 选择不适部位</div>
        <div class="body-parts">
            <div class="body-part">头部</div>
            <div class="body-part">胸部</div>
            <div class="body-part selected">腹部</div>
            <div class="body-part">背部</div>
            <div class="body-part">四肢</div>
            <div class="body-part">全身</div>
            <div class="body-part">皮肤</div>
            <div class="body-part">其他</div>
        </div>
    </div>
    
    <!-- 症状选择 -->
    <div class="symptom-selector">
        <div class="section-title">2. 选择症状特征</div>
        <div class="symptom-tags">
            <div class="symptom-tag selected">疼痛</div>
            <div class="symptom-tag">胀痛</div>
            <div class="symptom-tag">隐痛</div>
            <div class="symptom-tag">绞痛</div>
            <div class="symptom-tag">刺痛</div>
            <div class="symptom-tag">持续性</div>
            <div class="symptom-tag">间歇性</div>
            <div class="symptom-tag">伴有发热</div>
            <div class="symptom-tag">伴有恶心</div>
            <div class="symptom-tag">食欲不振</div>
            <div class="symptom-tag">呕吐</div>
        </div>
    </div>
    
    <!-- 自定义输入 -->
    <div class="custom-input">
        <div class="section-title">3. 详细描述（可选）</div>
        <textarea class="custom-textarea" placeholder="请详细描述您的症状，如持续时间、加重因素等...">腹部疼痛3天，主要集中在右上腹，持续性胀痛，伴有恶心...</textarea>
    </div>
    
    <!-- 查询按钮 -->
    <div class="query-btn">开始智能分析</div>
    
    <!-- 结果预览 -->
    <div class="result-preview">
        <div class="result-header">📊 可能疾病分析结果</div>
        
        <div class="disease-item">
            <div class="disease-name">胆囊炎</div>
            <div class="disease-prob high">72%</div>
        </div>
        
        <div class="disease-item">
            <div class="disease-name">胃溃疡</div>
            <div class="disease-prob medium">45%</div>
        </div>
        
        <div class="disease-item">
            <div class="disease-name">消化不良</div>
            <div class="disease-prob low">28%</div>
        </div>
        
        <div class="disease-item">
            <div class="disease-name">肝炎</div>
            <div class="disease-prob low">15%</div>
        </div>
        
        <div class="urgent-tip">
            🚨 预警提示：右上腹持续性疼痛伴恶心，建议尽快就医检查，排除胆囊炎可能。
        </div>
    </div>
    
    <!-- 底部 -->
    <div class="footer">
        来源：临床诊断学知识图谱 | 免责声明：仅供参考，请遵医嘱
    </div>
    
    <script>
        // 身体部位选择
        document.querySelectorAll('.body-part').forEach(part => {
            part.addEventListener('click', function() {
                document.querySelectorAll('.body-part').forEach(p => p.classList.remove('selected'));
                this.classList.add('selected');
            });
        });
        
        // 症状选择
        document.querySelectorAll('.symptom-tag').forEach(tag => {
            tag.addEventListener('click', function() {
                this.classList.toggle('selected');
            });
        });
        
        // 查询按钮
        document.querySelector('.query-btn').addEventListener('click', function() {
            alert('正在智能分析您的症状...\n（演示原型）');
        });
        
        // 返回按钮
        document.querySelector('.back-btn').addEventListener('click', function() {
            alert('返回首页（演示原型）');
        });
    </script>
</body>
</html>
