<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>症状自查 - Skill版</title>
    <link rel="stylesheet" href="colors.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', -apple-system, sans-serif;
            background: var(--bg-secondary);
            max-width: 375px;
            margin: 0 auto;
            min-height: 100vh;
            color: var(--text-primary);
            padding-bottom: 100px;
        }
        body::before { content: ""; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(135deg, rgba(74,144,226,0.03) 0%, rgba(126,211,178,0.03) 100%); z-index: -1; }
        
        .top-section {
            padding: 24px;
            animation: fadeSlideDown 0.6s ease-out;
        }
        @keyframes fadeSlideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .back-btn {
            width: 44px;
            height: 44px;
            border: 2px solid var(--color-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s;
        }
        .back-btn:hover {
            border-color: var(--color-primary);
            transform: rotate(-10deg);
        }
        
        .header-title {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 900;
            margin-left: 16px;
            letter-spacing: -1px;
        }
        
        .disclaimer {
            background: var(--bg-light-yellow);
            border-left: 3px solid #FF6B6B;
            padding: 16px 24px;
            margin: 24px;
            font-size: 13px;
            color: var(--text-primary);
            animation: fadeIn 0.5s ease-out 0.1s both;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .symptom-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            padding: 24px;
        }
        
        .symptom-card {
            background: var(--bg-primary);
            border: 1px solid var(--border-light);
            border-radius: 20px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s;
            animation: fadeIn 0.5s ease-out both;
        }
        .symptom-card:nth-child(1) { animation-delay: 0.2s; }
        .symptom-card:nth-child(2) { animation-delay: 0.3s; }
        .symptom-card:nth-child(3) { animation-delay: 0.4s; }
        .symptom-card:nth-child(4) { animation-delay: 0.5s; }
        .symptom-card:nth-child(5) { animation-delay: 0.6s; }
        .symptom-card:nth-child(6) { animation-delay: 0.7s; }
        
        .symptom-card:hover {
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.15);
            transform: translateY(-4px);
        }
        
        .symptom-card.selected {
            background: rgba(255,107,107,0.15);
            border-color: var(--color-primary);
        }
        
        .symptom-icon {
            width: 48px;
            height: 48px;
            margin: 0 auto 16px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            background: linear-gradient(135deg, rgba(255,107,107,0.2) 0%, rgba(78,205,196,0.2) 100%);
        }
        
        .symptom-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .footer-btns {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            max-width: 375px;
            margin: 0 auto;
            background: rgba(10,10,10,0.9);
            border-top: 1px solid rgba(255,255,255,0.08);
            padding: 20px 24px 24px;
            display: flex;
            gap: 16px;
            backdrop-filter: blur(20px);
        }
        
        .action-btn {
            flex: 1;
            padding: 16px;
            border-radius: 24px;
            text-align: center;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .action-btn:hover { transform: translateY(-2px); }
        
        .btn-secondary {
            background: var(--bg-primary);
            border: 1px solid rgba(255,255,255,0.15);
            color: var(--text-primary);
        }
        .btn-primary {
            background: linear-gradient(135deg, #FF6B6B 0%, #4ECDC4 100%);
            color: white;
            border: none;
            box-shadow: 0 8px 24px rgba(255,107,107,0.2);
        }
    </style>
</head>
<body>
    <div class="top-section">
        <div class="header">
            <div class="back-btn">←</div>
            <div class="header-title">症状自查</div>
        </div>
    </div>
    
    <div class="disclaimer">
        ⚠ 本功能仅供参考，不能替代医师诊断。如有严重症状请及时就医。
    </div>
    
    <div class="symptom-grid">
        <div class="symptom-card">
            <div class="symptom-icon">◉</div>
            <div class="symptom-title">头痛</div>
        </div>
        
        <div class="symptom-card">
            <div class="symptom-icon">◎</div>
            <div class="symptom-title">发热</div>
        </div>
        
        <div class="symptom-card">
            <div class="symptom-icon">◇</div>
            <div class="symptom-title">咳嗽</div>
        </div>
        
        <div class="symptom-card">
            <div class="symptom-icon">●</div>
            <div class="symptom-title">胸闷</div>
        </div>
        
        <div class="symptom-card">
            <div class="symptom-icon">⏱</div>
            <div class="symptom-title">失眠</div>
        </div>
        
        <div class="symptom-card">
            <div class="symptom-icon">≡</div>
            <div class="symptom-title">胃痛</div>
        </div>
    </div>
    
    <div class="footer-btns">
        <div class="action-btn btn-secondary">清空选择</div>
        <div class="action-btn btn-primary">开始分析</div>
    </div>
    
    <script>
        document.querySelector('.back-btn').onclick = () => location.href = '首页_skill版.html';
        
        // 症状选择
        document.querySelectorAll('.symptom-card').forEach(card => {
            card.onclick = function() {
                this.classList.toggle('selected');
            };
        });
        
        // 清空选择
        document.querySelector('.btn-secondary').onclick = () => {
            document.querySelectorAll('.symptom-card').forEach(c => c.classList.remove('selected'));
        };
        
        // 症状-疾病映射
        const symptomDiseaseMap = {
            '头痛': ['高血压', '偏头痛', '感冒', '颈椎病'],
            '发热': ['感冒', '流感', '肺炎', '扁桃体炎'],
            '咳嗽': ['感冒', '支气管炎', '肺炎', '哮喘'],
            '胸闷': ['冠心病', '心律失常', '焦虑症', '哮喘'],
            '失眠': ['失眠症', '焦虑症', '抑郁症', '神经衰弱'],
            '胃痛': ['胃炎', '胃溃疡', '消化不良', '胆囊炎']
        };
        
        // 开始分析
        document.querySelector('.btn-primary').onclick = () => {
            const selected = document.querySelectorAll('.symptom-card.selected');
            if (selected.length === 0) {
                showToast('请选择至少一个症状');
                return;
            }
            
            // 获取选中症状
            const symptoms = Array.from(selected).map(card => 
                card.querySelector('.symptom-title').textContent
            );
            
            // 分析可能疾病
            const diseaseCount = {};
            symptoms.forEach(symptom => {
                const diseases = symptomDiseaseMap[symptom] || [];
                diseases.forEach(disease => {
                    diseaseCount[disease] = (diseaseCount[disease] || 0) + 1;
                });
            });
            
            // 排序
            const results = Object.entries(diseaseCount)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 3)
                .map(([disease, count]) => ({
                    name: disease,
                    probability: Math.round((count / symptoms.length) * 100)
                }));
            
            // 显示结果
            showAnalysisResult(symptoms, results);
        };
        
        // 显示分析结果
        function showAnalysisResult(symptoms, results) {
            const resultHTML = `
                <div class="analysis-result" style="
                    position: fixed;
                    top: 0; left: 0; right: 0; bottom: 0;
                    background: var(--bg-primary);
                    z-index: 1000;
                    padding: 24px;
                    overflow-y: auto;
                ">
                    <div style="max-width: 375px; margin: 0 auto;">
                        <div style="display: flex; align-items: center; margin-bottom: 24px;">
                            <div class="back-btn" style="
                                width: 44px; height: 44px;
                                border: 2px solid var(--border-light);
                                border-radius: 50%;
                                display: flex; align-items: center; justify-content: center;
                                cursor: pointer; font-size: 20px;
                            " onclick="this.closest('.analysis-result').remove()">←</div>
                            <div style="font-size: 20px; font-weight: 700; margin-left: 16px; color: var(--color-primary);">分析结果</div>
                        </div>
                        
                        <div style="background: var(--bg-light-blue); border-radius: 12px; padding: 16px; margin-bottom: 24px;">
                            <div style="font-size: 12px; color: var(--text-tertiary); margin-bottom: 8px;">已选症状</div>
                            <div style="font-size: 14px; color: var(--text-primary);">
                                ${symptoms.join('、')}
                            </div>
                        </div>
                        
                        <div style="font-size: 16px; font-weight: 700; margin-bottom: 16px; color: var(--text-primary);">可能疾病</div>
                        
                        ${results.map((r, i) => `
                            <div style="
                                background: var(--bg-primary);
                                border: 1px solid var(--border-light);
                                border-radius: 12px;
                                padding: 16px;
                                margin-bottom: 12px;
                                cursor: pointer;
                            " onclick="location.href='疾病详情_skill版.html'">
                                <div style="display: flex; justify-content: space-between; align-items: center;">
                                    <div style="font-size: 16px; font-weight: 600; color: var(--text-primary);">${r.name}</div>
                                    <div style="
                                        background: ${i === 0 ? 'var(--color-primary)' : 'var(--bg-secondary)'};
                                        color: ${i === 0 ? 'white' : 'var(--text-tertiary)'};
                                        padding: 4px 12px;
                                        border-radius: 12px;
                                        font-size: 12px;
                                    ">${r.probability}%</div>
                                </div>
                            </div>
                        `).join('')}
                        
                        <div style="
                            background: var(--bg-light-yellow);
                            border-left: 3px solid var(--color-warning);
                            padding: 16px;
                            border-radius: 8px;
                            margin-top: 24px;
                        ">
                            <div style="font-size: 14px; color: var(--text-primary); line-height: 1.6;">
                                <strong>温馨提示：</strong>本分析结果仅供参考，不能替代医师诊断。如症状持续或加重，请及时就医。
                            </div>
                        </div>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', resultHTML);
            
            // 记录查询
            addQueryRecord(symptoms.join('+'), '症状自查');
        }
        
        // Toast提示
        function showToast(message) {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                bottom: 100px;
                left: 50%;
                transform: translateX(-50%);
                background: rgba(0,0,0,0.8);
                color: white;
                padding: 12px 24px;
                border-radius: 24px;
                font-size: 14px;
                z-index: 2000;
            `;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }
        
        // 查询记录工具
        function addQueryRecord(name, type) {
            const records = JSON.parse(localStorage.getItem('queryRecords') || '[]');
            records.unshift({
                name: name,
                type: type,
                time: new Date().toISOString()
            });
            localStorage.setItem('queryRecords', JSON.stringify(records.slice(0, 50)));
        }
    </script>
</body>
</html>
