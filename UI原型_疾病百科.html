<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>疾病百科 - UI原型</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: #f5f5f5;
            max-width: 375px;
            margin: 0 auto;
            min-height: 100vh;
        }
        
        .header {
            background: linear-gradient(135deg, #9C27B0 0%, #7B1FA2 100%);
            color: white;
            padding: 16px;
            display: flex;
            align-items: center;
        }
        
        .back-btn { font-size: 20px; margin-right: 12px; cursor: pointer; color: #fff; }
        .header-title { font-size: 16px; font-weight: 600; }
        
        .search-box {
            background: white;
            margin: 12px;
            padding: 12px;
            border-radius: 8px;
        }
        
        .search-input {
            width: 100%;
            height: 40px;
            border: 1px solid #E0E0E0;
            border-radius: 20px;
            padding: 0 16px;
            font-size: 14px;
        }
        
        .search-input:focus {
            outline: none;
            border-color: #9C27B0;
        }
        
        .search-input::placeholder {
            color: #999;
        }
        
        .category-tabs {
            display: flex;
            padding: 12px;
            gap: 8px;
            overflow-x: auto;
            background: white;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .category-tab {
            padding: 8px 18px;
            background: #F3E5F5;
            border-radius: 20px;
            font-size: 13px;
            color: #7B1FA2;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .category-tab.active {
            background: #9C27B0;
            color: white;
            box-shadow: 0 2px 8px rgba(156, 39, 176, 0.3);
        }
        
        .disease-list {
            padding: 12px;
        }
        
        .disease-item {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 10px;
            cursor: pointer;
            border-left: 4px solid #9C27B0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .disease-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        }
        
        .disease-name {
            font-size: 15px;
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }
        
        .disease-category {
            font-size: 12px;
            color: #999;
        }
        
        .disease-tags {
            margin-top: 8px;
            display: flex;
            gap: 6px;
        }
        
        .disease-tag {
            padding: 2px 8px;
            background: #F3E5F5;
            border-radius: 10px;
            font-size: 11px;
            color: #7B1FA2;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="back-btn">←</div>
        <div class="header-title">疾病百科</div>
    </div>
    
    <div class="search-box">
        <input type="text" class="search-input" placeholder="搜索疾病名称...">
    </div>
    
    <div class="category-tabs">
        <div class="category-tab active">全部</div>
        <div class="category-tab">内科</div>
        <div class="category-tab">外科</div>
        <div class="category-tab">妇科</div>
        <div class="category-tab">儿科</div>
        <div class="category-tab">五官科</div>
    </div>
    
    <div class="disease-list">
        <div class="disease-item">
            <div class="disease-name">高血压</div>
            <div class="disease-category">内科 · 心血管系统</div>
            <div class="disease-tags">
                <div class="disease-tag">常见病</div>
                <div class="disease-tag">慢病</div>
            </div>
        </div>
        
        <div class="disease-item">
            <div class="disease-name">糖尿病</div>
            <div class="disease-category">内科 · 内分泌系统</div>
            <div class="disease-tags">
                <div class="disease-tag">常见病</div>
                <div class="disease-tag">慢病</div>
            </div>
        </div>
        
        <div class="disease-item">
            <div class="disease-name">感冒</div>
            <div class="disease-category">内科 · 呼吸系统</div>
            <div class="disease-tags">
                <div class="disease-tag">常见病</div>
            </div>
        </div>
        
        <div class="disease-item">
            <div class="disease-name">胃炎</div>
            <div class="disease-category">内科 · 消化系统</div>
            <div class="disease-tags">
                <div class="disease-tag">常见病</div>
            </div>
        </div>
        
        <div class="disease-item">
            <div class="disease-name">颈椎病</div>
            <div class="disease-category">外科 · 骨科</div>
            <div class="disease-tags">
                <div class="disease-tag">职业病</div>
            </div>
        </div>
    </div>
    
    <script>
        document.querySelector('.back-btn').addEventListener('click', () => location.href = 'index.html');
        
        // 分类筛选
        document.querySelectorAll('.category-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
            });
        });
        
        // 点击疾病跳转详情
        document.querySelectorAll('.disease-item').forEach(item => {
            item.addEventListener('click', () => location.href = 'UI原型_疾病详情.html');
        });
    </script>
</body>
</html>
