<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>查询记录 - UI原型</title>
    <style>
        /* Notion风格 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: #ffffff;
            max-width: 375px;
            margin: 0 auto;
            min-height: 100vh;
            color: rgba(0,0,0,0.95);
        }
        
        .header {
            background: #523410;
            color: #fff;
            padding: 16px;
            display: flex;
            align-items: center;
        }
        
        .back-btn { font-size: 20px; margin-right: 12px; cursor: pointer; color: #fff; }
        .header-title { font-size: 16px; font-weight: 600; }
        
        .stats {
            display: flex;
            padding: 16px;
            background: #f6f5f4;
            gap: 12px;
        }
        
        .stat-card {
            flex: 1;
            background: #fff;
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: 4px;
            padding: 12px;
            text-align: center;
        }
        
        .stat-num {
            font-size: 24px;
            font-weight: 600;
            color: #0075de;
        }
        
        .stat-label {
            font-size: 12px;
            color: #615d59;
            margin-top: 4px;
        }
        
        .filter-tabs {
            display: flex;
            padding: 12px 16px;
            gap: 8px;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }
        
        .filter-tab {
            padding: 6px 12px;
            background: #f6f5f4;
            border-radius: 9999px;
            font-size: 12px;
            color: #615d59;
            cursor: pointer;
        }
        
        .filter-tab.active {
            background: #0075de;
            color: #fff;
        }
        
        .history-list {
            padding: 16px;
        }
        
        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: rgba(0,0,0,0.95);
            margin-bottom: 12px;
        }
        
        .history-item {
            padding: 12px;
            background: #f6f5f4;
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: 4px;
            margin-bottom: 8px;
            cursor: pointer;
        }
        
        .history-item:hover {
            background: #e8e8e8;
        }
        
        .history-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }
        
        .history-title {
            font-size: 13px;
            font-weight: 500;
        }
        
        .history-time {
            font-size: 11px;
            color: #615d59;
        }
        
        .history-type {
            display: inline-block;
            padding: 2px 8px;
            background: #fff;
            border-radius: 9999px;
            font-size: 11px;
            color: #0075de;
            margin-top: 4px;
        }
        
        .search-box {
            padding: 16px;
        }
        
        .search-input {
            width: 100%;
            height: 40px;
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: 4px;
            padding: 0 12px;
            font-size: 14px;
        }
        
        .search-input:focus {
            outline: none;
            border-color: #0075de;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="back-btn">←</div>
        <div class="header-title">查询记录</div>
    </div>
    
    <div class="stats">
        <div class="stat-card">
            <div class="stat-num">28</div>
            <div class="stat-label">总查询次数</div>
        </div>
        <div class="stat-card">
            <div class="stat-num">12</div>
            <div class="stat-label">疾病查询</div>
        </div>
        <div class="stat-card">
            <div class="stat-num">16</div>
            <div class="stat-label">药品查询</div>
        </div>
    </div>
    
    <div class="filter-tabs">
        <div class="filter-tab active">全部</div>
        <div class="filter-tab">疾病</div>
        <div class="filter-tab">药品</div>
        <div class="filter-tab">症状</div>
    </div>
    
    <div class="search-box">
        <input type="text" class="search-input" placeholder="搜索历史记录...">
    </div>
    
    <div class="history-list">
        <div class="section-title">最近查询</div>
        
        <div class="history-item">
            <div class="history-header">
                <div class="history-title">高血压</div>
                <div class="history-time">今天 14:30</div>
            </div>
            <div class="history-type">疾病</div>
        </div>
        
        <div class="history-item">
            <div class="history-header">
                <div class="history-title">氨氯地平片</div>
                <div class="history-time">今天 14:32</div>
            </div>
            <div class="history-type">药品</div>
        </div>
        
        <div class="history-item">
            <div class="history-header">
                <div class="history-title">头痛</div>
                <div class="history-time">昨天 20:15</div>
            </div>
            <div class="history-type">症状</div>
        </div>
        
        <div class="history-item">
            <div class="history-header">
                <div class="history-title">感冒</div>
                <div class="history-time">4月5日</div>
            </div>
            <div class="history-type">疾病</div>
        </div>
    </div>
    
    <script>
        document.querySelector('.back-btn').addEventListener('click', () => location.href = 'index.html');
        
        document.querySelectorAll('.filter-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
            });
        });
        
        document.querySelectorAll('.history-item').forEach(item => {
            item.addEventListener('click', function() {
                const type = this.querySelector('.history-type').textContent;
                if (type === '疾病') {
                    location.href = 'UI原型_疾病详情.html';
                } else if (type === '药品') {
                    location.href = 'UI原型_药品详情.html';
                } else {
                    location.href = 'UI原型_症状自查.html';
                }
            });
        });
    </script>
</body>
</html>
