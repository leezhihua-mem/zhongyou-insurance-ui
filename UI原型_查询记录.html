<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>查询记录 - UI原型</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: #f5f5f5;
            max-width: 375px;
            margin: 0 auto;
            padding-bottom: 20px;
        }
        .header {
            background: linear-gradient(135deg, #D84315 0%, #BF360C 100%);
            color: white;
            padding: 16px;
            display: flex;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .back-btn { font-size: 24px; margin-right: 12px; cursor: pointer; }
        .header-title { font-size: 18px; font-weight: 600; }
        .clear-btn { font-size: 13px; margin-left: auto; cursor: pointer; }
        
        .stats-card {
            background: white;
            margin: 12px;
            padding: 16px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .stats-row {
            display: flex;
            justify-content: space-around;
            text-align: center;
        }
        .stat-item { }
        .stat-value { font-size: 24px; font-weight: 700; color: #D84315; }
        .stat-label { font-size: 12px; color: #999; margin-top: 4px; }
        
        .tabs {
            background: white;
            margin: 12px;
            padding: 4px;
            border-radius: 25px;
            display: flex;
        }
        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            border-radius: 20px;
            font-size: 14px;
            color: #999;
            cursor: pointer;
        }
        .tab.active {
            background: #D84315;
            color: white;
        }
        
        .record-list {
            margin: 12px;
        }
        .date-header {
            font-size: 13px;
            color: #999;
            margin: 16px 0 8px 0;
        }
        
        .record-item {
            background: white;
            padding: 14px;
            border-radius: 10px;
            margin-bottom: 8px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            display: flex;
            align-items: center;
            cursor: pointer;
        }
        
        .record-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-right: 12px;
        }
        .icon-disease { background: #F3E5F5; }
        .icon-drug { background: #E8F5E9; }
        .icon-symptom { background: #E3F2FD; }
        .icon-ai { background: #E0F7FA; }
        
        .record-content { flex: 1; }
        .record-title { font-size: 15px; color: #333; font-weight: 500; }
        .record-time { font-size: 12px; color: #999; margin-top: 4px; }
        
        .record-arrow { color: #CCC; font-size: 18px; }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }
        .empty-icon { font-size: 48px; margin-bottom: 12px; }
        
        .search-box {
            background: white;
            margin: 12px;
            padding: 12px 16px;
            border-radius: 25px;
            display: flex;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .search-icon { color: #999; margin-right: 8px; }
        .search-input {
            flex: 1;
            border: none;
            font-size: 14px;
            outline: none;
        }
    
        /* 底部导航 */
        .footer-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 375px;
            margin: 0 auto;
            background: white;
            border-top: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-around;
            padding: 8px 0 12px;
            z-index: 100;
        }
        
        .nav-item {
            text-align: center;
            padding: 4px 8px;
            cursor: pointer;
        }
        
        .nav-icon {
            font-size: 18px;
            color: #999;
        }
        
        .nav-text {
            font-size: 11px;
            color: #999;
            margin-top: 2px;
        }
        
        .nav-item:hover .nav-icon,
        .nav-item:hover .nav-text {
            color: #4A90E2;
        }
</style>
</head>
<body>
    <div class="header">
        <div class="back-btn" onclick="location.href='index.html'">←</div>
        <div class="header-title">查询记录</div>
        <div class="clear-btn" onclick="alert('确认清空所有记录？')">清空</div>
    </div>
    
    <div class="stats-card">
        <div class="stats-row">
            <div class="stat-item">
                <div class="stat-value">156</div>
                <div class="stat-label">总查询</div>
            </div>
            <div class="stat-item">
                <div class="stat-value">23</div>
                <div class="stat-label">本周</div>
            </div>
            <div class="stat-item">
                <div class="stat-value">12</div>
                <div class="stat-label">关注疾病</div>
            </div>
        </div>
    </div>
    
    <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" class="search-input" placeholder="搜索历史记录...">
    </div>
    
    <div class="tabs">
        <div class="tab active" onclick="switchTab(this)">全部</div>
        <div class="tab" onclick="switchTab(this)">疾病</div>
        <div class="tab" onclick="switchTab(this)">药品</div>
        <div class="tab" onclick="switchTab(this)">症状</div>
    </div>
    
    <div class="record-list">
        <div class="date-header">今天</div>
        
        <div class="record-item" onclick="location.href='UI原型_疾病详情.html'">
            <div class="record-icon icon-disease">📚</div>
            <div class="record-content">
                <div class="record-title">高血压</div>
                <div class="record-time">今天 14:32 · 疾病查询</div>
            </div>
            <div class="record-arrow">›</div>
        </div>
        
        <div class="record-item" onclick="location.href='UI原型_药品详情.html'">
            <div class="record-icon icon-drug">💊</div>
            <div class="record-content">
                <div class="record-title">氨氯地平</div>
                <div class="record-time">今天 14:30 · 药品查询</div>
            </div>
            <div class="record-arrow">›</div>
        </div>
        
        <div class="record-item" onclick="location.href='UI原型_症状自查.html'">
            <div class="record-icon icon-symptom">🔍</div>
            <div class="record-content">
                <div class="record-title">头痛、头晕</div>
                <div class="record-time">今天 10:15 · 症状自查</div>
            </div>
            <div class="record-arrow">›</div>
        </div>
        
        <div class="date-header">昨天</div>
        
        <div class="record-item">
            <div class="record-icon icon-ai">🤖</div>
            <div class="record-content">
                <div class="record-title">感冒发烧吃什么药</div>
                <div class="record-time">昨天 21:30 · AI问答</div>
            </div>
            <div class="record-arrow">›</div>
        </div>
        
        <div class="record-item">
            <div class="record-icon icon-disease">📚</div>
            <div class="record-content">
                <div class="record-title">糖尿病</div>
                <div class="record-time">昨天 16:20 · 疾病查询</div>
            </div>
            <div class="record-arrow">›</div>
        </div>
        
        <div class="date-header">04月06日</div>
        
        <div class="record-item">
            <div class="record-icon icon-drug">💊</div>
            <div class="record-content">
                <div class="record-title">二甲双胍</div>
                <div class="record-time">04-06 15:45 · 药品查询</div>
            </div>
            <div class="record-arrow">›</div>
        </div>
        
        <div class="record-item">
            <div class="record-icon icon-symptom">🔍</div>
            <div class="record-content">
                <div class="record-title">胃痛、反酸</div>
                <div class="record-time">04-06 09:30 · 症状自查</div>
            </div>
            <div class="record-arrow">›</div>
        </div>
    </div>
    
    <script>
        function switchTab(el) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            alert('切换到：' + el.textContent + '（演示原型）');
        }
    
        // 底部导航
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function() {
                const text = this.querySelector('.nav-text').textContent;
                const navMap = {
                    '首页': 'index.html',
                    '查询': 'UI原型_症状自查.html',
                    '提醒': 'UI原型_用药提醒.html'
                };
                if (text === '我的') {
                    alert('个人中心开发中...');
                } else if (navMap[text]) {
                    location.href = navMap[text];
                }
            });
        });
</script>

    <!-- 底部导航 -->
    <div class="footer-nav">
        <div class="nav-item">
            <div class="nav-icon">🏠</div>
            <div class="nav-text">首页</div>
        </div>
        <div class="nav-item">
            <div class="nav-icon">🔍</div>
            <div class="nav-text">查询</div>
        </div>
        <div class="nav-item">
            <div class="nav-icon">⏰</div>
            <div class="nav-text">提醒</div>
        </div>
        <div class="nav-item">
            <div class="nav-icon">👤</div>
            <div class="nav-text">我的</div>
        </div>
    </div>
</body>
</html>
