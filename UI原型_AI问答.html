<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI问答 - UI原型</title>
    <style>
        /* Notion风格 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: #ffffff;
            max-width: 375px;
            margin: 0 auto;
            min-height: 100vh;
            color: rgba(0,0,0,0.95);
            display: flex;
            flex-direction: column;
        }
        
        .header {
            background: #0075de;
            color: #fff;
            padding: 16px;
            display: flex;
            align-items: center;
        }
        
        .back-btn { font-size: 20px; margin-right: 12px; cursor: pointer; color: #fff; }
        .header-title { font-size: 16px; font-weight: 600; }
        
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }
        
        .message {
            margin-bottom: 16px;
        }
        
        .message-user {
            text-align: right;
        }
        
        .message-user .bubble {
            background: #0075de;
            color: #fff;
        }
        
        .message-ai .bubble {
            background: #f6f5f4;
            color: rgba(0,0,0,0.95);
        }
        
        .bubble {
            display: inline-block;
            padding: 12px 16px;
            border-radius: 16px;
            max-width: 85%;
            font-size: 14px;
            line-height: 1.5;
        }
        
        .source {
            margin-top: 8px;
            font-size: 11px;
            color: #615d59;
        }
        
        .source a {
            color: #0075de;
            text-decoration: none;
        }
        
        .quick-questions {
            padding: 12px 16px;
            background: #f6f5f4;
            border-top: 1px solid rgba(0,0,0,0.1);
        }
        
        .quick-title {
            font-size: 12px;
            color: #615d59;
            margin-bottom: 8px;
        }
        
        .quick-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .quick-item {
            padding: 6px 12px;
            background: #fff;
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: 9999px;
            font-size: 12px;
            color: rgba(0,0,0,0.95);
            cursor: pointer;
        }
        
        .quick-item:hover {
            background: #f2f9ff;
            border-color: #0075de;
        }
        
        .input-area {
            padding: 12px 16px;
            background: #ffffff;
            border-top: 1px solid rgba(0,0,0,0.1);
            display: flex;
            gap: 8px;
        }
        
        .input-field {
            flex: 1;
            height: 40px;
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: 20px;
            padding: 0 16px;
            font-size: 14px;
        }
        
        .input-field:focus {
            outline: none;
            border-color: #0075de;
        }
        
        .send-btn {
            width: 40px;
            height: 40px;
            background: #0075de;
            color: #fff;
            border: none;
            border-radius: 50%;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="back-btn">←</div>
        <div class="header-title">AI健康助手</div>
    </div>
    
    <div class="chat-area">
        <div class="message message-ai">
            <div class="bubble">
                您好！我是AI健康助手，可以为您解答疾病、症状、用药相关问题。请问有什么可以帮助您的？
            </div>
        </div>
        
        <div class="message message-user">
            <div class="bubble">高血压患者饮食要注意什么？</div>
        </div>
        
        <div class="message message-ai">
            <div class="bubble">
                高血压患者饮食建议：<br><br>
                <b>1. 低盐饮食</b>：每日盐摄入<5g<br>
                <b>2. 多吃蔬菜水果</b>：富含钾，有助降压<br>
                <b>3. 限制脂肪</b>：少吃动物内脏、肥肉<br>
                <b>4. 戒烟限酒</b>：避免血压波动<br><br>
                建议定期监测血压，规律服药，适当运动。
            </div>
            <div class="source">
                来源：<a href="#">《中国高血压防治指南》</a>
            </div>
        </div>
    </div>
    
    <div class="quick-questions">
        <div class="quick-title">快捷问题</div>
        <div class="quick-list">
            <div class="quick-item">感冒了怎么办</div>
            <div class="quick-item">失眠怎么调理</div>
            <div class="quick-item">胃痛吃什么药</div>
        </div>
    </div>
    
    <div class="input-area">
        <input type="text" class="input-field" placeholder="输入您的问题...">
        <button class="send-btn">→</button>
    </div>
    
    <script>
        document.querySelector('.back-btn').addEventListener('click', () => location.href = 'index.html');
        
        // 接收首页搜索参数
        const params = new URLSearchParams(location.search);
        const query = params.get('q');
        if (query) {
            document.querySelector('.input-field').value = query;
        }
        
        // 快捷问题
        document.querySelectorAll('.quick-item').forEach(item => {
            item.addEventListener('click', function() {
                document.querySelector('.input-field').value = this.textContent;
            });
        });
        
        // 发送消息
        const sendBtn = document.querySelector('.send-btn');
        const inputField = document.querySelector('.input-field');
        const chatArea = document.querySelector('.chat-area');
        
        function sendMessage() {
            const text = inputField.value.trim();
            if (!text) return;
            
            // 添加用户消息
            const userMsg = document.createElement('div');
            userMsg.className = 'message message-user';
            userMsg.innerHTML = '<div class="bubble">' + text + '</div>';
            chatArea.appendChild(userMsg);
            
            // 清空输入框
            inputField.value = '';
            
            // 模拟AI回复
            setTimeout(() => {
                const aiMsg = document.createElement('div');
                aiMsg.className = 'message message-ai';
                aiMsg.innerHTML = '<div class="bubble">感谢您的提问！这是原型演示，完整功能将在开发阶段实现。<br><br>如需真实医疗咨询，请咨询专业医生。</div><div class="source">来源：AI助手</div>';
                chatArea.appendChild(aiMsg);
                chatArea.scrollTop = chatArea.scrollHeight;
            }, 500);
        }
        
        sendBtn.addEventListener('click', sendMessage);
        inputField.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
