<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>药品查询 - 动态版</title>
    <link rel="stylesheet" href="colors.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', -apple-system, sans-serif;
            background: var(--bg-secondary);
            max-width: 375px;
            margin: 0 auto;
            min-height: 100vh;
            color: var(--text-primary);
        }
        .top-section {
            padding: 32px 24px 24px;
        }
        .header-title {
            font-size: 28px;
            font-weight: 900;
            margin-bottom: 24px;
        }
        .search-box {
            background: var(--bg-primary);
            border: 1px solid var(--border-light);
            border-radius: 28px;
            padding: 18px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }
        .search-input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 16px;
            color: var(--text-primary);
            outline: none;
        }
        .category-tabs {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding-bottom: 16px;
        }
        .category-tab {
            padding: 10px 20px;
            border-radius: 20px;
            border: 1px solid var(--border-light);
            background: var(--bg-primary);
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.3s;
        }
        .category-tab.active {
            background: var(--color-primary);
            color: white;
            border-color: var(--color-primary);
        }
        .drug-list {
            padding: 0 24px 100px;
        }
        .drug-item {
            background: var(--bg-primary);
            border: 1px solid var(--border-light);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .drug-item:hover {
            border-color: var(--color-primary);
            transform: translateY(-2px);
        }
        .drug-name {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .drug-generic {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }
        .drug-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .drug-tag {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }
        .drug-tag.rx {
            background: rgba(255,107,107,0.15);
            color: var(--color-primary);
        }
        .drug-tag.otc {
            background: rgba(78,205,196,0.15);
            color: #4ECDC4;
        }
        .drug-tag.category {
            background: rgba(74,144,226,0.15);
            color: #4A90E2;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }
        .no-result {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="top-section">
        <div class="header-title">药品查询</div>
        <div class="search-box">
            <span>🔍</span>
            <input type="text" class="search-input" placeholder="搜索药品名称、适应症..." id="searchInput">
        </div>
        <div class="category-tabs" id="categoryTabs">
            <div class="category-tab active" data-category="all">全部</div>
            <div class="category-tab" data-category="心血管">心血管</div>
            <div class="category-tab" data-category="糖尿病">糖尿病</div>
            <div class="category-tab" data-category="呼吸">呼吸</div>
            <div class="category-tab" data-category="消化">消化</div>
            <div class="category-tab" data-category="神经">神经</div>
            <div class="category-tab" data-category="抗感染">抗感染</div>
            <div class="category-tab" data-category="皮肤">皮肤</div>
        </div>
    </div>
    
    <div class="drug-list" id="drugList">
        <div class="loading">加载中...</div>
    </div>

    <script src="js/medicine-data.js"></script>
    <script>
        let allMedicines = [];
        let currentCategory = 'all';
        
        // 初始化
        async function init() {
            allMedicines = await MedicineData.loadAll();
            renderList(allMedicines);
            console.log(`加载 ${allMedicines.length} 种药品`);
        }
        
        // 渲染列表
        function renderList(medicines) {
            const container = document.getElementById('drugList');
            
            if (medicines.length === 0) {
                container.innerHTML = '<div class="no-result">未找到相关药品</div>';
                return;
            }
            
            container.innerHTML = medicines.map(m => `
                <div class="drug-item" onclick="openDetail('${m.id}')">
                    <div class="drug-name">${m.name}</div>
                    <div class="drug-generic">${m.genericName} · ${m.brandName}</div>
                    <div class="drug-tags">
                        <span class="drug-tag ${m.isPrescription ? 'rx' : 'otc'}">
                            ${m.isPrescription ? '处方药' : 'OTC'}
                        </span>
                        <span class="drug-tag category">${m.category}</span>
                    </div>
                </div>
            `).join('');
        }
        
        // 搜索
        function handleSearch(e) {
            const query = e.target.value;
            filterAndRender(query, currentCategory);
        }
        
        // 分类过滤
        function handleCategoryClick(e) {
            if (!e.target.classList.contains('category-tab')) return;
            
            document.querySelectorAll('.category-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            e.target.classList.add('active');
            
            currentCategory = e.target.dataset.category;
            const query = document.getElementById('searchInput').value;
            filterAndRender(query, currentCategory);
        }
        
        // 过滤并渲染
        function filterAndRender(query, category) {
            let filtered = allMedicines;
            
            // 分类过滤
            if (category !== 'all') {
                filtered = filtered.filter(m => 
                  m.category.includes(category) || 
                  (m.subcategory && m.subcategory.includes(category))
                );
            }
            
            // 关键词搜索
            if (query) {
                query = query.toLowerCase();
                filtered = filtered.filter(m => 
                    m.name.toLowerCase().includes(query) ||
                    m.genericName.toLowerCase().includes(query) ||
                    m.brandName.toLowerCase().includes(query) ||
                    m.indication.toLowerCase().includes(query)
                );
            }
            
            renderList(filtered);
        }
        
        // 打开详情
        function openDetail(id) {
            localStorage.setItem('currentMedicineId', id);
            window.location.href = '药品详情_动态版.html';
        }
        
        // 事件绑定
        document.getElementById('searchInput').addEventListener('input', handleSearch);
        document.getElementById('categoryTabs').addEventListener('click', handleCategoryClick);
        
        // 启动
        init();
    </script>
</body>
</html>
