<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>用药与疾病知识手册 - UI原型</title>
    <style>
        /* Notion风格设计系统 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: #ffffff;
            max-width: 375px;
            margin: 0 auto;
            min-height: 100vh;
            color: rgba(0,0,0,0.95);
            line-height: 1.5;
        }
        
        /* 头部 - Notion蓝 */
        .header {
            background: #0075de;
            color: #ffffff;
            padding: 24px 16px;
            text-align: center;
        }
        
        .header-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .header-subtitle {
            font-size: 13px;
            opacity: 0.9;
            font-weight: 400;
        }
        
        /* 免责声明 - 温暖黄色 */
        .disclaimer {
            background: #fff8e6;
            border: 1px solid rgba(0,0,0,0.1);
            padding: 12px 16px;
            margin: 12px 16px;
            border-radius: 4px;
            font-size: 13px;
            color: #856404;
            line-height: 1.4;
        }
        
        /* 搜索框 - Notion温暖灰背景 */
        .search-box {
            background: #f6f5f4;
            margin: 16px;
            padding: 12px;
            border-radius: 4px;
        }
        
        .search-input {
            width: 100%;
            height: 40px;
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: 4px;
            padding: 0 12px 0 36px;
            font-size: 14px;
            background: #ffffff url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8" fill="none" stroke="%23615d59" stroke-width="2"/><path d="M21 21l-4.35-4.35" fill="none" stroke="%23615d59" stroke-width="2"/></svg>') no-repeat 10px center;
            background-size: 16px;
            color: rgba(0,0,0,0.95);
        }
        
        .search-input:focus {
            outline: none;
            border-color: #0075de;
        }
        
        .search-input::placeholder {
            color: #615d59;
        }
        
        .search-btn {
            display: none;
        }
        
        /* 功能模块 */
        .modules {
            margin: 16px;
        }
        
        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: rgba(0,0,0,0.95);
            margin-bottom: 12px;
        }
        
        .module-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }
        
        .module-card {
            background: #f6f5f4;
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: 4px;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .module-card:hover {
            background: #e8e8e8;
        }
        
        .module-icon {
            width: 32px;
            height: 32px;
            margin-bottom: 8px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
        
        /* 温暖色调图标背景 */
        .module-icon.symptom { background: #e3f2ff; color: #0075de; }
        .module-icon.disease { background: #f3e5f5; color: #7b1fa2; }
        .module-icon.drug { background: #e8f5e9; color: #2a9d99; }
        .module-icon.remind { background: #fff3e0; color: #dd5b00; }
        .module-icon.ai { background: #e0f7fa; color: #0097a7; }
        .module-icon.history { background: #fbe9e7; color: #523410; }
        
        .module-title {
            font-size: 13px;
            font-weight: 600;
            color: rgba(0,0,0,0.95);
            margin-bottom: 2px;
        }
        
        .module-desc {
            font-size: 12px;
            color: #615d59;
        }
        
        /* 热门查询 */
        .hot-queries {
            margin: 16px;
        }
        
        .hot-list {
            background: #f6f5f4;
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: 4px;
            padding: 12px;
        }
        
        .hot-item {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            cursor: pointer;
        }
        
        .hot-item:last-child {
            border-bottom: none;
        }
        
        .hot-item:hover {
            background: #e8e8e8;
            margin: 0 -12px;
            padding-left: 12px;
            padding-right: 12px;
        }
        
        /* Pill徽章 */
        .hot-rank {
            width: 20px;
            height: 20px;
            background: #f2f9ff;
            color: #097fe8;
            border-radius: 9999px;
            text-align: center;
            line-height: 20px;
            font-size: 11px;
            font-weight: 600;
            margin-right: 10px;
        }
        
        .hot-rank.top1 { background: #ff6b6b; color: #fff; }
        .hot-rank.top2 { background: #2a9d99; color: #fff; }
        .hot-rank.top3 { background: #0075de; color: #fff; }
        
        .hot-text {
            font-size: 13px;
            color: rgba(0,0,0,0.95);
        }
        
        /* 小程序提示 */
        .mini-program-tip {
            background: #e8f5e9;
            border: 1px solid rgba(0,0,0,0.1);
            padding: 12px 16px;
            margin: 16px;
            border-radius: 4px;
            font-size: 13px;
            color: #2a9d99;
        }
        
        /* 底部导航 */
        .footer-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 375px;
            margin: 0 auto;
            background: #ffffff;
            border-top: 1px solid rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-around;
            padding: 8px 0 12px;
        }
        
        .nav-item {
            text-align: center;
            padding: 4px 8px;
            cursor: pointer;
        }
        
        .nav-icon {
            font-size: 18px;
            color: #615d59;
        }
        
        .nav-text {
            font-size: 11px;
            color: #615d59;
            margin-top: 2px;
        }
        
        .nav-item.active .nav-icon,
        .nav-item.active .nav-text {
            color: #0075de;
        }
    </style>
</head>
<body>
    <!-- 头部 -->
    <div class="header">
        <div class="header-title">用药与疾病知识手册</div>
        <div class="header-subtitle">您的健康查询助手</div>
    </div>
    
    <!-- 免责声明 -->
    <div class="disclaimer">
        ⚠️ 本资料仅供参考，不能替代专业医师的诊疗建议。如有不适，请及时就医。
    </div>
    
    <!-- 搜索框 -->
    <div class="search-box">
        <input type="text" class="search-input" placeholder="搜索疾病、症状或药品...">
    </div>
    
    <!-- 功能模块 -->
    <div class="modules">
        <div class="section-title">核心功能</div>
        <div class="module-grid">
            <div class="module-card">
                <div class="module-icon symptom">🔍</div>
                <div class="module-title">症状自查</div>
                <div class="module-desc">智能分析可能病因</div>
            </div>
            <div class="module-card">
                <div class="module-icon disease">📚</div>
                <div class="module-title">疾病百科</div>
                <div class="module-desc">200+疾病知识库</div>
            </div>
            <div class="module-card">
                <div class="module-icon drug">💊</div>
                <div class="module-title">药品查询</div>
                <div class="module-desc">300+常用药品</div>
            </div>
            <div class="module-card">
                <div class="module-icon remind">⏰</div>
                <div class="module-title">用药提醒</div>
                <div class="module-desc">服药计划管理</div>
            </div>
            <div class="module-card">
                <div class="module-icon ai">🤖</div>
                <div class="module-title">AI问答</div>
                <div class="module-desc">智能健康助手</div>
            </div>
            <div class="module-card">
                <div class="module-icon history">📋</div>
                <div class="module-title">查询记录</div>
                <div class="module-desc">历史查询回顾</div>
            </div>
        </div>
    </div>
    
    <!-- 热门查询 -->
    <div class="hot-queries">
        <div class="section-title">热门查询</div>
        <div class="hot-list">
            <div class="hot-item">
                <div class="hot-rank top1">1</div>
                <div class="hot-text">高血压症状及治疗</div>
            </div>
            <div class="hot-item">
                <div class="hot-rank top2">2</div>
                <div class="hot-text">糖尿病患者饮食禁忌</div>
            </div>
            <div class="hot-item">
                <div class="hot-rank top3">3</div>
                <div class="hot-text">感冒发烧吃什么药</div>
            </div>
            <div class="hot-item">
                <div class="hot-rank">4</div>
                <div class="hot-text">头痛原因分析</div>
            </div>
            <div class="hot-item">
                <div class="hot-rank">5</div>
                <div class="hot-text">胃溃疡饮食调理</div>
            </div>
        </div>
    </div>
    
    <!-- 小程序提示 -->
    <div class="mini-program-tip">
        ✅ 此页面已适配小程序接入，支持微信、支付宝小程序。
    </div>
    
    <!-- 底部导航 -->
    <div class="footer-nav">
        <div class="nav-item active">
            <div class="nav-icon">🏠</div>
            <div class="nav-text">首页</div>
        </div>
        <div class="nav-item">
            <div class="nav-icon">🔍</div>
            <div class="nav-text">查询</div>
        </div>
        <div class="nav-item">
            <div class="nav-icon">⏰</div>
            <div class="nav-text">提醒</div>
        </div>
        <div class="nav-item">
            <div class="nav-icon">👤</div>
            <div class="nav-text">我的</div>
        </div>
    </div>
    
    <script>
        // 搜索框 - 回车跳转到AI问答
        document.querySelector('.search-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && this.value.trim()) {
                location.href = 'UI原型_AI问答.html?q=' + encodeURIComponent(this.value);
            }
        });
        
        // 点击模块卡片 - 跳转到对应页面
        document.querySelectorAll('.module-card').forEach(card => {
            card.addEventListener('click', function() {
                const title = this.querySelector('.module-title').textContent;
                const pageMap = {
                    '症状自查': 'UI原型_症状自查.html',
                    '疾病百科': 'UI原型_疾病详情.html',
                    '药品查询': 'UI原型_药品详情.html',
                    '用药提醒': 'UI原型_用药提醒.html',
                    'AI问答': 'UI原型_AI问答.html',
                    '查询记录': 'UI原型_查询记录.html'
                };
                const page = pageMap[title];
                if (page) {
                    location.href = page;
                }
            });
        });
        
        // 点击热门查询
        document.querySelectorAll('.hot-item').forEach(item => {
            item.addEventListener('click', function() {
                const text = this.querySelector('.hot-text').textContent;
                if (text.includes('高血压') || text.includes('糖尿病') || text.includes('胃')) {
                    location.href = 'UI原型_疾病详情.html';
                } else if (text.includes('感冒') || text.includes('发烧')) {
                    location.href = 'UI原型_药品详情.html';
                } else if (text.includes('头痛')) {
                    location.href = 'UI原型_症状自查.html';
                } else {
                    location.href = 'UI原型_AI问答.html';
                }
            });
        });
        
        // 底部导航
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function() {
                const text = this.querySelector('.nav-text').textContent;
                const navMap = {
                    '首页': 'index.html',
                    '查询': 'UI原型_症状自查.html',
                    '提醒': 'UI原型_用药提醒.html'
                };
                if (text === '我的') {
                    alert('个人中心开发中...');
                } else if (navMap[text]) {
                    location.href = navMap[text];
                }
            });
        });
    </script>
</body>
</html>
