<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中邮保险健康平台 - 药品查询系统</title>
    <link rel="stylesheet" href="colors.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', -apple-system, sans-serif;
            background: var(--bg-secondary);
            max-width: 375px;
            margin: 0 auto;
            min-height: 100vh;
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(74,144,226,0.05) 0%, rgba(126,211,178,0.05) 100%);
            z-index: -1;
        }
        .logo {
            font-size: 48px;
            margin-bottom: 24px;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        .title {
            font-size: 32px;
            font-weight: 900;
            margin-bottom: 12px;
            text-align: center;
            letter-spacing: -1px;
        }
        .subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 48px;
            text-align: center;
        }
        .stats {
            display: flex;
            gap: 24px;
            margin-bottom: 48px;
        }
        .stat-item {
            text-align: center;
        }
        .stat-number {
            font-size: 36px;
            font-weight: 900;
            color: var(--color-primary);
        }
        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
        }
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
        }
        .btn {
            display: block;
            padding: 18px 32px;
            border-radius: 24px;
            text-align: center;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
            cursor: pointer;
        }
        .btn-primary {
            background: linear-gradient(135deg, #FF6B6B 0%, #4ECDC4 100%);
            color: white;
            border: none;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(255,107,107,0.3);
        }
        .btn-secondary {
            background: var(--bg-primary);
            color: var(--text-primary);
            border: 1px solid var(--border-light);
        }
        .btn-secondary:hover {
            border-color: var(--color-primary);
            background: var(--bg-light-blue);
        }
        .version {
            margin-top: 48px;
            font-size: 12px;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="logo">💊</div>
    <div class="title">中邮保险健康平台</div>
    <div class="subtitle">智能药品查询系统 · 家庭健康助手</div>
    
    <div class="stats">
        <div class="stat-item">
            <div class="stat-number">260</div>
            <div class="stat-label">药品数量</div>
        </div>
        <div class="stat-item">
            <div class="stat-number">7</div>
            <div class="stat-label">药品分类</div>
        </div>
        <div class="stat-item">
            <div class="stat-number">12</div>
            <div class="stat-label">信息字段</div>
        </div>
    </div>
    
    <div class="btn-group">
        <a href="首页_skill版.html" class="btn btn-primary">🏠 进入完整原型</a>
    </div>
    
    <div class="version">v1.3 · 2026-04-14 16:23</div>
</body>
</html>
