<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家康OS - 用药手册（匠心优化版）- 新版首页</title>
    <style>
        /* 匠心统一设计规范 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Source Han Sans', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
            background: #F5F5F5;
            color: #212121;
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .logo {
            font-size: 48px;
            margin-bottom: 16px;
        }
        
        .title {
            font-size: 28px;
            color: #2C5F2D;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .subtitle {
            font-size: 16px;
            color: #757575;
        }
        
        .section {
            background: white;
            margin: 20px 0;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        
        .section-title {
            font-size: 18px;
            color: #2C5F2D;
            font-weight: 600;
            margin-bottom: 16px;
        }
        
        .prototype-list {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }
        
        .prototype-item {
            padding: 16px;
            border-radius: 8px;
            background: #F5F5F5;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }
        
        .prototype-item:hover {
            background: #E8F5E9;
        }
        
        .prototype-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }
        
        .prototype-name {
            font-size: 14px;
            color: #212121;
            font-weight: 500;
        }
        
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            background: #E8F5E9;
            color: #2C5F2D;
            margin-left: 8px;
        }
        
        /* AI应用实验室特殊样式 */
        .ai-lab-card {
            background: linear-gradient(135deg, #e8f5e9, #f1f8e9);
            border: 2px solid #4CAF50;
        }
        
        .ai-lab-card:hover {
            background: linear-gradient(135deg, #c8e6c9, #dcedc8);
            transform: scale(1.05);
        }
        
        .ai-stats {
            display: flex;
            gap: 5px;
            margin-top: 8px;
            justify-content: center;
        }
        
        .ai-stat-badge {
            background: #4CAF50;
            color: white;
            padding: 2px 6px;
            border-radius: 10px;
            font-size: 10px;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="logo">🏥</div>
        <div class="title">家康OS - 用药手册</div>
        <div class="subtitle">匠心优化版（符合前端设计规范v2.0）<span class="badge">⭐⭐⭐⭐⭐</span></div>
    </div>
    
    <!-- AI应用实验室入口 -->
    <div class="section">
        <div class="section-title">🥔 AI应用实验室（新功能）</div>
        <a href="ai-app-lab.html" class="prototype-item ai-lab-card">
            <div class="prototype-icon">🥔</div>
            <div class="prototype-name" style="color: #2C5F2D; font-weight: 600;">AI应用实验室</div>
            <div style="font-size: 11px; color: #666; margin-top: 5px;">病例OCR小程序</div>
            <div class="ai-stats">
                <span class="ai-stat-badge">99%</span>
                <span class="ai-stat-badge">95%</span>
                <span class="ai-stat-badge">25</span>

        </a>
    </div>

        <div class="prototype-list">

                <div class="prototype-name">首页</div>
            </a>
            <a href="UI原型_用药提醒_匠心优化版.html" class="prototype-item">

            <a href="UI原型_药品查询_匠心优化版.html" class="prototype-item">

            <a href="UI原型_药品详情_匠心优化版.html" class="prototype-item">

                <div class="prototype-name">药品详情</div>
            </a>
            <a href="UI原型_AI问答_匠心优化版.html" class="prototype-item">
                <div class="prototype-icon">💬</div>

        </div>
    </div>
    
    <!-- Footer -->
    <div style="text-align: center; margin-top: 40px; padding: 20px; font-size: 13px; color: #757575;">
        <div>GitHub: https://github.com/leezhihua-mem/zhongyou-insurance-ui.git</div>
        <div style="margin-top: 8px;">优化时间：2026-04-18 | 匠心Agent</div>
        <div style="margin-top: 8px;">新增：AI应用实验室（病例OCR小程序）</div>
    </div>
</body>
