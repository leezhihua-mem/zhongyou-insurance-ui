<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家康OS - 症状自查（匠心优化版）</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Source Han Sans', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
            background: #F5F5F5;
            max-width: 375px;
            margin: 0 auto;
            padding-bottom: 80px;
            color: #212121;
        }
        
        /* 底部标签导航（可跳转）⭐⭐⭐⭐⭐ */
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 8px 0;
            border-top: 1px solid #E0E0E0;
            z-index: 1000;
            max-width: 375px;
            margin: 0 auto;
        }
        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            text-decoration: none;
            color: #212121;
        }
        .tab-item:hover { color: #2C5F2D; }
        .tab-item.active { color: #2C5F2D; }
        .tab-icon { font-size: 24px; margin-bottom: 4px; }
        .tab-label { font-size: 12px; }
        
        /* Header */
        .header {
            background: #2C5F2D;
            color: white;
            padding: 16px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-title { font-size: 18px; font-weight: 600; text-align: center; }
        
        /* 步骤指示器 */
        .step-indicator {
            background: white;
            padding: 16px;
            display: flex;
            justify-content: center;
            gap: 12px;
            border-bottom: 1px solid #E0E0E0;
        }
        
        .step {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .step-number {
            width: 24px;
            height: 24px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
        }
        
        .step-number.active {
            background: #2C5F2D;
            color: white;
        }
        
        .step-number.completed {
            background: #97BC62;
            color: white;
        }
        
        .step-number.inactive {
            background: #E0E0E0;
            color: #757575;
        }
        
        .step-label {
            font-size: 12px;
            color: #757575;
        }
        
        .step-label.active {
            color: #212121;
            font-weight: 500;
        }
        
        /* 症状选择卡片 */
        .symptom-card {
            background: white;
            margin: 12px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        
        .card-header {
            padding: 16px;
            border-bottom: 1px solid #E0E0E0;
            font-size: 16px;
            font-weight: 600;
        }
        
        .symptom-item {
            padding: 16px;
            border-bottom: 1px solid #E0E0E0;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .symptom-item:last-child { border-bottom: none; }
        .symptom-item:hover { background: #F5F5F5; }
        .symptom-item.selected { background: #E8F5E9; }
        
        .symptom-checkbox {
            width: 20px;
            height: 20px;
            border-radius: 10px;
            border: 2px solid #E0E0E0;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .symptom-item.selected .symptom-checkbox {
            background: #2C5F2D;
            border-color: #2C5F2D;
        }
        
        .symptom-item.selected .symptom-checkbox::after {
            content: "✓";
            color: white;
            font-size: 12px;
        }
        
        .symptom-name {
            font-size: 14px;
        }
        
        /* 提交按钮（跳转到AI问答）⭐⭐⭐⭐⭐ */
        .submit-btn {
            background: #2C5F2D;
            color: white;
            margin: 16px 12px;
            padding: 14px;
            border-radius: 25px;
            text-align: center;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(44,95,45,0.3);
            text-decoration: none;
            display: block;
        }
        
        .submit-btn:hover {
            background: #97BC62;
        }
        
        /* 温馨提示 */
        .disclaimer {
            background: #FFF3E0;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            color: #EF6C00;
            margin: 12px;
            text-align: center;
        }
    </style>
</head>
<body>
    <!-- 底部标签导航（可跳转）⭐⭐⭐⭐⭐ -->
    <div class="tab-bar">
        <a href="UI原型_首页_匠心优化版.html" class="tab-item">
            <div class="tab-icon">🏠</div>
            <div class="tab-label">首页</div>
        </a>
        <a href="#" class="tab-item active">
            <div class="tab-icon">⚠️</div>
            <div class="tab-label">预警</div>
        </a>
        <a href="UI原型_用药提醒_匠心优化版.html" class="tab-item">
            <div class="tab-icon">💊</div>
            <div class="tab-label">用药</div>
        </a>
        <a href="UI原型_AI问答_匠心优化版.html" class="tab-item">
            <div class="tab-icon">💬</div>
            <div class="tab-label">咨询</div>
        </a>
        <a href="#" class="tab-item">
            <div class="tab-icon">👤</div>
            <div class="tab-label">我的</div>
        </a>
    </div>
    
    <!-- Header -->
    <div class="header">
        <div class="header-title">症状自查</div>
    </div>
    
    <!-- 步骤指示器 -->
    <div class="step-indicator">
        <div class="step">
            <div class="step-number active">1</div>
            <div class="step-label active">选择症状</div>
        </div>
        <div class="step">
            <div class="step-number inactive">2</div>
            <div class="step-label">补充信息</div>
        </div>
        <div class="step">
            <div class="step-number inactive">3</div>
            <div class="step-label">查看结果</div>
        </div>
    </div>
    
    <!-- 温馨提示 -->
    <div class="disclaimer">
        ⚠️ 本自查仅供参考，不替代专业医生诊断。如有紧急症状，请立即就医。
    </div>
    
    <!-- 症状选择卡片 -->
    <div class="symptom-card">
        <div class="card-header">请选择您的症状</div>
        
        <div class="symptom-item selected">
            <div class="symptom-checkbox"></div>
            <div class="symptom-name">头晕</div>
        </div>
        
        <div class="symptom-item">
            <div class="symptom-checkbox"></div>
            <div class="symptom-name">头痛</div>
        </div>
        
        <div class="symptom-item">
            <div class="symptom-checkbox"></div>
            <div class="symptom-name">心悸</div>
        </div>
        
        <div class="symptom-item">
            <div class="symptom-checkbox"></div>
            <div class="symptom-name">胸闷</div>
        </div>
        
        <div class="symptom-item">
            <div class="symptom-checkbox"></div>
            <div class="symptom-name">乏力</div>
        </div>
        
        <div class="symptom-item">
            <div class="symptom-checkbox"></div>
            <div class="symptom-name">耳鸣</div>
        </div>
    </div>
    
    <!-- 常见症状组合 -->
    <div class="symptom-card">
        <div class="card-header">常见症状组合</div>
        
        <div class="symptom-item">
            <div class="symptom-checkbox"></div>
            <div class="symptom-name">头晕 + 头痛（可能是高血压）</div>
        </div>
        
        <div class="symptom-item">
            <div class="symptom-checkbox"></div>
            <div class="symptom-name">胸闷 + 心悸（可能是心脏问题）</div>
        </div>
        
        <div class="symptom-item">
            <div class="symptom-checkbox"></div>
            <div class="symptom-name">乏力 + 头晕（可能是贫血或低血糖）</div>
        </div>
    </div>
    
    <!-- 提交按钮（跳转到AI问答）⭐⭐⭐⭐⭐ -->
    <a href="UI原型_AI问答_匠心优化版.html" class="submit-btn">下一步：补充信息</a>
</body>
</html>
